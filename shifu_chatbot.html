  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap');

  <script>
    // --- SHIFU EMBRYO CORE ENGINE ---
    const VERSION="2.0.0";
    const OCR={"0,o":.1,"1,l":.2,"1,i":.2,"5,s":.3,"8,b":.3,"6,g":.4,"l,i":.2,"m,n":.4,"u,v":.5,"c,e":.5,"r,n":.3,"d,o":.3,"f,t":.4,"h,b":.4,"a,e":.4,"a,o":.4,"u,n":.4,"e,i":.4,"f,l":.4,"s,e":.5,"b,d":.4};
    const mean=a=>a.length?a.reduce((s,v)=>s+v,0)/a.length:0;
    function editDistance(a,b){a=a.toLowerCase();b=b.toLowerCase();if(a.length<b.length)return editDistance(b,a);if(!b.length)return a.length;let p=Array.from({length:b.length+1},(_,i)=>i);for(let i=0;i<a.length;i++){const c=[i+1];for(let j=0;j<b.length;j++)c.push(Math.min(p[j+1]+1,c[j]+1,p[j]+(a[i]===b[j]?0:1)));p=c;}return p[b.length];}
    function ocrDistance(a,b){a=a.toLowerCase();b=b.toLowerCase();if(a.length<b.length)return ocrDistance(b,a);if(!b.length)return a.length;let p=Array.from({length:b.length+1},(_,i)=>i);for(let i=0;i<a.length;i++){const c=[i+1];for(let j=0;j<b.length;j++){const k=[a[i],b[j]].sort().join(",");c.push(Math.min(p[j+1]+1,c[j]+1,p[j]+(a[i]===b[j]?0:(OCR[k]??1))));}p=c;}return p[b.length];}
    function sharedBigrams(a,b){a=a.toLowerCase();b=b.toLowerCase();if(a.length<2||b.length<2)return 0;const bg=s=>{const m=new Map();for(let i=0;i<s.length-1;i++){const k=s.slice(i,i+2);m.set(k,(m.get(k)||0)+1);}return m;};const ba=bg(a),bb=bg(b);let inter=0;for(const[k,v]of ba)inter+=Math.min(v,bb.get(k)||0);const tot=[...ba.values()].reduce((a,b)=>a+b,0)+[...bb.values()].reduce((a,b)=>a+b,0);return tot?2*inter/tot:0;}
    function tokenize(raw){return(raw.toLowerCase().match(/[a-z0-9]+/g)||[]).filter(w=>w.length>1);}

    class ShifuEmbryo{
      constructor(){this.nodes={};this.sentenceCount=0;this.tokenCount=0;this._idxLen={};this._idxBg={};}
      _nn(w){return{chars:w,freq:0,firstSeen:null,lastSeen:null,positions:[],gaps:[],sentLengths:[],neighbors:{},next:{},prev:{},next2:{}};}
      _idx(w){const l=w.length;(this._idxLen[l]??=[]);if(!this._idxLen[l].includes(w))this._idxLen[l].push(w);for(let i=0;i<w.length-1;i++){const bg=w.slice(i,i+2);(this._idxBg[bg]??=[]);if(!this._idxBg[bg].includes(w))this._idxBg[bg].push(w);}}
      feed(raw){const ws=tokenize(raw);if(ws.length<2)return 0;this.sentenceCount++;const len=ws.length;for(let i=0;i<ws.length;i++){const w=ws[i];const isNew=!(w in this.nodes);const nd=this.nodes[w]??=this._nn(w);if(isNew)this._idx(w);const rp=i/Math.max(ws.length-1,1);this.tokenCount++;nd.freq++;nd.firstSeen??=this.sentenceCount;if(nd.lastSeen!==null)(nd.gaps??=[]).push(this.sentenceCount-nd.lastSeen);nd.lastSeen=this.sentenceCount;(nd.positions??=[]).push(rp);(nd.sentLengths??=[]).push(len);if(!nd.neighbors)nd.neighbors={};if(!nd.next)nd.next={};if(!nd.prev)nd.prev={};const win=Math.max(1,Math.min(5,Math.round(5-Math.log2(nd.freq+1)*4/14)));for(let j=Math.max(0,i-win);j<Math.min(ws.length,i+win+1);j++){if(j!==i)nd.neighbors[ws[j]]=(nd.neighbors[ws[j]]||0)+1;}if(i<ws.length-1)nd.next[ws[i+1]]=(nd.next[ws[i+1]]||0)+1;if(i>0)nd.prev[ws[i-1]]=(nd.prev[ws[i-1]]||0)+1;if(i<ws.length-2){const b=ws[i+1],c=ws[i+2];if(!nd.next2)nd.next2={};nd.next2[b]??={};nd.next2[b][c]=(nd.next2[b][c]||0)+1;}if(nd.positions&&nd.positions.length>200)nd.positions=nd.positions.slice(-200);if(nd.gaps&&nd.gaps.length>100)nd.gaps=nd.gaps.slice(-100);if(nd.sentLengths&&nd.sentLengths.length>100)nd.sentLengths=nd.sentLengths.slice(-100);}return ws.length;}
      feedText(t){const s=t.split(/[.!?\n]+/).map(s=>s.trim()).filter(s=>s.length>5);let tk=0;for(const x of s)tk+=this.feed(x);return{sentences:s.length,tokens:tk};}
      depth(w){const n=this.nodes[w];if(!n)return{level:"unborn",evidence:0};if(n.freq===1)return{level:"surface",evidence:.1};if(n.freq<5)return{level:"shallow",evidence:.2};const nb=Object.keys(n.neighbors).length,sq=Object.keys(n.next).length+Object.keys(n.prev).length;const ev=Math.min((n.freq/50)*.3+(nb/20)*.3+(sq/10)*.2+(n.positions.length/50)*.2,1);if(ev<.3)return{level:"forming",evidence:ev};if(ev<.7)return{level:"structured",evidence:ev};return{level:"deep",evidence:ev};}
      compare(a,b){const al=a.toLowerCase(),bl=b.toLowerCase(),na=this.nodes[al],nb=this.nodes[bl],sig={},wt={};sig.editSim=1-editDistance(al,bl)/Math.max(al.length,bl.length,1);sig.bigramSim=sharedBigrams(al,bl);sig.ocrSim=1-ocrDistance(al,bl)/Math.max(al.length,bl.length,1);wt.char=.05;if(!na||!nb)return{similarity:sig.editSim*.3+sig.bigramSim*.3+sig.ocrSim*.4,signals:sig,weights:wt,totalWeight:.05,depth:"surface"};const nbA=Object.keys(na.neighbors),nbBs=new Set(Object.keys(nb.neighbors)),shared=nbA.filter(x=>nbBs.has(x)),union=new Set([...nbA,...nbBs]);if(union.size>0){const rw=w=>1/Math.max(Math.log2((this.nodes[w]?.freq||0)+1),1);const sw=shared.reduce((s,w)=>s+rw(w),0),uw=[...union].reduce((s,w)=>s+rw(w),0);sig.neighborOverlap=uw>0?sw/uw:0;wt.neighbor=Math.min(union.size/10,.35);}const totA=Object.values(na.next).reduce((s,v)=>s+v,0),totB=Object.values(nb.next).reduce((s,v)=>s+v,0);if(totA>0||totB>0){sig.expectsAB=totA?(na.next[bl]||0)/totA:0;sig.expectsBA=totB?(nb.next[al]||0)/totB:0;sig.directional=Math.abs(sig.expectsAB-sig.expectsBA);wt.seq=Math.min((totA+totB)/20,.25);}const nx2AB=na.next2?.[bl]?Object.keys(na.next2[bl]).length:0,nx2BA=nb.next2?.[al]?Object.keys(nb.next2[al]).length:0;if(nx2AB>0||nx2BA>0){sig.trajectoryAB=Math.min(nx2AB/5,1);sig.trajectoryBA=Math.min(nx2BA/5,1);wt.traj=.15;}if(na.positions.length>=3&&nb.positions.length>=3){sig.posSim=1-Math.min(Math.abs(mean(na.positions)-mean(nb.positions))*2,1);wt.pos=Math.min(Math.min(na.positions.length,nb.positions.length)/20,.10);}let indAB=0;for(const mid of Object.keys(na.next))if(this.nodes[mid]?.next[bl])indAB++;if(indAB>0){sig.indirectAB=Math.min(indAB/5,1);wt.indirect=Math.min(indAB/10,.15);}let sim=0,tw=0;if(wt.char){sim+=(sig.editSim*.3+sig.bigramSim*.3+sig.ocrSim*.4)*wt.char;tw+=wt.char;}if(wt.neighbor){sim+=sig.neighborOverlap*wt.neighbor;tw+=wt.neighbor;}if(wt.seq){sim+=Math.max(sig.expectsAB||0,sig.expectsBA||0)*wt.seq;tw+=wt.seq;}if(wt.traj){sim+=Math.max(sig.trajectoryAB||0,sig.trajectoryBA||0)*wt.traj;tw+=wt.traj;}if(wt.pos){sim+=sig.posSim*wt.pos;tw+=wt.pos;}if(wt.indirect){sim+=sig.indirectAB*wt.indirect;tw+=wt.indirect;}if(tw>0)sim/=tw;const d=tw>.5?"deep":tw>.3?"structured":tw>.15?"forming":"shallow";return{similarity:sim,signals:sig,weights:wt,totalWeight:tw,depth:d};}
      affinity(a,b){const al=a.toLowerCase(),bl=b.toLowerCase(),na=this.nodes[al],nb=this.nodes[bl];if(!na||!nb)return{a:al,b:bl,mutual:0,known:false};const nbA=Object.keys(na.neighbors),nbBs=new Set(Object.keys(nb.neighbors)),shared=nbA.filter(x=>nbBs.has(x)),rw=w=>1/Math.max(Math.log2((this.nodes[w]?.freq||0)+1),1),sw=shared.reduce((s,w)=>s+rw(w),0),uw=[...new Set([...nbA,...nbBs])].reduce((s,w)=>s+rw(w),0),orbit=uw>0?sw/uw:0;const totA=Object.values(na.next||{}).reduce((s,v)=>s+v,0),totB=Object.values(nb.next||{}).reduce((s,v)=>s+v,0),pullAB=totA?(na.next[bl]||0)/totA:0,pullBA=totB?(nb.next[al]||0)/totB:0;let indAB=0,indBA=0;for(const mid of Object.keys(na.next||{}))if(this.nodes[mid]?.next[bl])indAB++;for(const mid of Object.keys(nb.next||{}))if(this.nodes[mid]?.next[al])indBA++;indAB=Math.min(indAB/5,1);indBA=Math.min(indBA/5,1);const charSim=1-editDistance(al,bl)/Math.max(al.length,bl.length,1);const fwA=new Set(Object.keys(na.next||{})),fwB=new Set(Object.keys(nb.next||{})),fwU=new Set([...fwA,...fwB]),expOvlp=fwU.size?[...fwA].filter(x=>fwB.has(x)).length/fwU.size:0;let posAlign=0;if(na.positions.length>=3&&nb.positions.length>=3)posAlign=1-Math.min(Math.abs(mean(na.positions)-mean(nb.positions))*3,1);const afAB=charSim*.05+orbit*.35+pullAB*.20+indAB*.20+expOvlp*.15+posAlign*.05,afBA=charSim*.05+orbit*.35+pullBA*.20+indBA*.20+expOvlp*.15+posAlign*.05;return{a:al,b:bl,orbit,pullAB,pullBA,indAB,indBA,charSim,expOvlp,posAlign,afAB,afBA,mutual:(afAB+afBA)/2,asym:Math.abs(afAB-afBA),known:true};}
      scoreSentence(raw){const ws=tokenize(raw);if(ws.length<2)return{words:ws,steps:[],meanSurprise:0,coherence:0};const steps=[];let total=0;const field=new Map();for(let i=0;i<ws.length;i++){const w=ws[i],node=this.nodes[w],step={word:w,pos:i,known:!!node};let sig=0,wts=0;if(i>0){const prev=this.nodes[ws[i-1]];if(prev?.next){const tot=Object.values(prev.next).reduce((a,b)=>a+b,0);step.seqS=1-((prev.next[w]||0)/Math.max(tot,1));sig+=step.seqS*.35;wts+=.35;}}if(i>=2){const pp=this.nodes[ws[i-2]],nx2=pp?.next2?.[ws[i-1]];if(nx2){const tot=Object.values(nx2).reduce((a,b)=>a+b,0);step.trajS=1-((nx2[w]||0)/Math.max(tot,1));sig+=step.trajS*.30;wts+=.30;}}if(i>0&&field.size>0){const fw=field.get(w)||0,mx=Math.max(...field.values(),1);step.fieldS=1-fw/mx;sig+=step.fieldS*.35;wts+=.35;}step.afGate=0;if(i>0&&node){const pn=this.nodes[ws[i-1]];if(pn?.neighbors&&node.neighbors){const pN=Object.keys(pn.neighbors),wN=new Set(Object.keys(node.neighbors)),sh=pN.filter(x=>wN.has(x)).length,un=new Set([...pN,...wN]).size;step.afGate=un?sh/un:0;}}step.surprise=wts>0?(sig/wts)*(1-step.afGate*.3):(node?.5:1);total+=step.surprise;step.cumS=total;steps.push(step);if(node?.neighbors)for(const[nb,cnt]of Object.entries(node.neighbors))field.set(nb,(field.get(nb)||0)+cnt);field.set(w,(field.get(w)||0)+10);}const ms=steps.length?total/steps.length:0;return{words:ws,steps,meanSurprise:ms,coherence:1-Math.min(ms,1)};}
      
      // FORGETTING & GRAPH TOPOLOGY
      pressureOf(w){const node=this.nodes[w];if(!node)return null;const inbound=Object.values(node.prev||{}).reduce((s,v)=>s+v,0);const actual=Object.keys(node.neighbors).length+Object.keys(node.next).length+Object.keys(node.prev).length;const p=actual-inbound;const nbrs=Object.keys(node.neighbors);let internal=0,pairs=0;for(let i=0;i<Math.min(nbrs.length,15);i++)for(let j=i+1;j<Math.min(nbrs.length,15);j++){pairs++;if(this.nodes[nbrs[i]]?.neighbors[nbrs[j]])internal++;}const closure=pairs>0?internal/pairs:1;return{word:w,pressure:p,inbound,actual,closure,freq:node.freq,depth:this.depth(w).level};}
      pressure(minFreq=2){const map=[];for(const[w,n]of Object.entries(this.nodes)){if(n.freq<minFreq)continue;map.push(this.pressureOf(w));}return map.sort((a,b)=>a.pressure-b.pressure);}
      vacuums(k=10){return this.pressure().filter(p=>p.pressure<0).slice(0,k);}
      surpluses(k=10){return this.pressure().filter(p=>p.pressure>0).sort((a,b)=>b.pressure-a.pressure).slice(0,k);}
      bridges(k=10){return this.pressure().filter(p=>p.closure<.3&&p.freq>=3).slice(0,k);}
      unlearn(a,b){const al=a.toLowerCase(),bl=b.toLowerCase(),na=this.nodes[al],nb=this.nodes[bl];if(!na||!nb)return{changed:false,reason:"unknown word"};let removed=0;if(na.neighbors[bl]){na.neighbors[bl]=Math.floor(na.neighbors[bl]/2);if(na.neighbors[bl]<=0)delete na.neighbors[bl];removed++;}if(nb.neighbors[al]){nb.neighbors[al]=Math.floor(nb.neighbors[al]/2);if(nb.neighbors[al]<=0)delete nb.neighbors[al];removed++;}if(na.next[bl]){na.next[bl]=Math.floor(na.next[bl]/2);if(na.next[bl]<=0)delete na.next[bl];removed++;}if(nb.next[al]){nb.next[al]=Math.floor(nb.next[al]/2);if(nb.next[al]<=0)delete nb.next[al];removed++;}if(na.prev[bl]){na.prev[bl]=Math.floor(na.prev[bl]/2);if(na.prev[bl]<=0)delete na.prev[bl];removed++;}if(nb.prev[al]){nb.prev[al]=Math.floor(nb.prev[al]/2);if(nb.prev[al]<=0)delete nb.prev[al];removed++;}if(na.next2[bl])delete na.next2[bl];if(nb.next2[al])delete nb.next2[al];for(const mid of Object.keys(na.next2||{})){if(na.next2[mid][bl]){delete na.next2[mid][bl];if(!Object.keys(na.next2[mid]).length)delete na.next2[mid];}}for(const mid of Object.keys(nb.next2||{})){if(nb.next2[mid][al]){delete nb.next2[mid][al];if(!Object.keys(nb.next2[mid]).length)delete nb.next2[mid];}}return{changed:removed>0,edgesWeakened:removed,a:al,b:bl};}
      forget(word){const w=word.toLowerCase();if(!this.nodes[w])return{changed:false,reason:"unknown word"};for(const[,other]of Object.entries(this.nodes)){delete other.neighbors[w];delete other.next[w];delete other.prev[w];delete other.next2[w];for(const mid of Object.keys(other.next2||{})){if(other.next2[mid][w]){delete other.next2[mid][w];if(!Object.keys(other.next2[mid]).length)delete other.next2[mid];}}}delete this.nodes[w];return{changed:true,word:w};}
      decay(threshold=1){let removed=0;for(const[,node]of Object.entries(this.nodes)){for(const[nb,cnt]of Object.entries(node.neighbors)){if(cnt<=threshold){delete node.neighbors[nb];removed++;}}for(const[nb,cnt]of Object.entries(node.next)){if(cnt<=threshold){delete node.next[nb];removed++;}}for(const[nb,cnt]of Object.entries(node.prev)){if(cnt<=threshold){delete node.prev[nb];removed++;}}for(const mid of Object.keys(node.next2||{})){for(const[dest,cnt]of Object.entries(node.next2[mid])){if(cnt<=threshold){delete node.next2[mid][dest];removed++;}}if(!Object.keys(node.next2[mid]).length)delete node.next2[mid];}}return{edgesRemoved:removed};}
      correct(garbled,k=5){const g=garbled.toLowerCase(),cands=new Set();for(let d=-2;d<=2;d++){const ws=this._idxLen[g.length+d];if(ws)for(const w of ws)cands.add(w);}for(let i=0;i<g.length-1;i++){const ws=this._idxBg[g.slice(i,i+2)];if(ws)for(const w of ws)cands.add(w);}const scored=[...cands].map(w=>{const o=1-ocrDistance(g,w)/Math.max(g.length,w.length,1),b=sharedBigrams(g,w);return{word:w,score:o*.7+b*.3};});scored.sort((a,b)=>b.score-a.score||(this.nodes[b.word]?.freq||0)-(this.nodes[a.word]?.freq||0));const top=scored.slice(0,k),conf=top.length>=2?top[0].score-top[1].score:top.length?1:0;return{candidates:top,confidence:conf};}
      similar(w,k=8){const wl=w.toLowerCase(),node=this.nodes[wl];if(!node)return[];const cands=new Set();for(const nb of Object.keys(node.neighbors)){cands.add(nb);const nbNode=this.nodes[nb];if(nbNode)for(const nb2 of Object.keys(nbNode.neighbors))cands.add(nb2);}for(const nb of Object.keys(node.next||{}))cands.add(nb);for(const nb of Object.keys(node.prev||{}))cands.add(nb);cands.delete(wl);const out=[];for(const c of cands){if(!this.nodes[c])continue;out.push({word:c,...this.compare(wl,c)});}return out.sort((a,b)=>b.similarity-a.similarity).slice(0,k);}
      stats(){const v=Object.keys(this.nodes).length,depths={unborn:0,surface:0,shallow:0,forming:0,structured:0,deep:0};for(const w of Object.keys(this.nodes))depths[this.depth(w).level]++;return{version:VERSION,vocab:v,sentences:this.sentenceCount,tokens:this.tokenCount,depths};}
      serialize(){return JSON.stringify({version:VERSION,nodes:Object.fromEntries(Object.entries(this.nodes).map(([w,n])=>[w,{chars:n.chars,freq:n.freq,firstSeen:n.firstSeen,lastSeen:n.lastSeen,positions:n.positions.slice(-200),gaps:n.gaps.slice(-100),sentLengths:n.sentLengths.slice(-100),neighbors:n.neighbors,next:n.next,prev:n.prev,next2:n.next2}])),sentenceCount:this.sentenceCount,tokenCount:this.tokenCount});}
      deserialize(json){const d=JSON.parse(json);this.sentenceCount=d.sentenceCount||0;this.tokenCount=d.tokenCount||0;for(const[w,n]of Object.entries(d.nodes||{})){this.nodes[w]={chars:n.chars||w,freq:n.freq||0,firstSeen:n.firstSeen,lastSeen:n.lastSeen,positions:n.positions||[],gaps:n.gaps||[],sentLengths:n.sentLengths||[],neighbors:n.neighbors||{},next:n.next||{},prev:n.prev||{},next2:n.next2||{}};this._idx(w);}return this;}
    }

    // --- TEACHER ---
    class Teacher {
      constructor(engine) {
        this.engine = engine;
        this.log = [];      
        this.corrections = 0;
        this.lessons = 0;
      }
      diagnose() {
        const vacs = this.engine.vacuums(10);
        const surps = this.engine.surpluses(10);
        const brs = this.engine.bridges(10);
        const st = this.engine.stats();
        const underexposed = [];
        for (const [w, n] of Object.entries(this.engine.nodes)) {
          const d = this.engine.depth(w);
          if (n.freq >= 3 && d.level === "shallow") underexposed.push({ word: w, freq: n.freq, evidence: d.evidence });
        }
        underexposed.sort((a, b) => b.freq - a.freq);
        const starved = [];
        for (const [w, n] of Object.entries(this.engine.nodes)) {
          if (n.freq < 2) continue;
          const p = this.engine.pressureOf(w);
          if (p && p.pressure < 0 && p.inbound >= 3) {
            starved.push({ word: w, inbound: p.inbound, actual: p.actual, deficit: p.inbound - p.actual });
          }
        }
        starved.sort((a, b) => b.deficit - a.deficit);
        return {
          vocab: st.vocab, depths: st.depths, vacuums: vacs, surpluses: surps, bridges: brs,
          underexposed: underexposed.slice(0, 10), starved: starved.slice(0, 10),
          needs: this._prescribe(vacs, underexposed, starved, brs, st),
        };
      }
      _prescribe(vacs, underexposed, starved, bridges, st) {
        const needs = [];
        if (st.vocab === 0) { needs.push("Empty engine. Feed any text to begin."); return needs; }
        if (st.depths.deep < 3) needs.push("Very few deep words. Feed more repeated sentences — the engine needs reinforcement, not breadth.");
        if (underexposed.length > 5) needs.push(`${underexposed.length} words seen 3+ times but still shallow. Feed sentences containing: ${underexposed.slice(0, 5).map(w => w.word).join(", ")}.`);
        if (starved.length > 0) needs.push(`${starved.length} words predicted by others but structurally thin. Feed contexts for: ${starved.slice(0, 5).map(w => w.word).join(", ")}.`);
        if (bridges.length > 0) needs.push(`${bridges.length} bridge words connecting disconnected neighborhoods. Consider whether these are real bridges or cross-contamination: ${bridges.slice(0, 3).map(b => b.word).join(", ")}.`);
        if (needs.length === 0) needs.push("Engine looks balanced. Feed new domain text to expand, or run contrastive drills to sharpen.");
        return needs;
      }
      lesson(text, domain = "general") {
        const before = this.engine.stats();
        const fed = this.engine.feedText(text);
        const decayed = before.vocab > 50 ? this.engine.decay(1) : { edgesRemoved: 0 };
        const after = this.engine.stats();
        const newWords = after.vocab - before.vocab;
        const newDepths = {};
        for (const level of Object.keys(after.depths)) newDepths[level] = after.depths[level] - before.depths[level];
        const textWords = text.toLowerCase().match(/[a-z0-9]+/g) || [];
        const filledVacuums = [], newVacuums = [];
        for (const w of new Set(textWords)) {
          const p = this.engine.pressureOf(w);
          if (p && p.pressure < 0) newVacuums.push(w);
        }
        this.lessons++;
        const result = { lesson: this.lessons, domain, fed, newWords, newDepths, decayed: decayed.edgesRemoved, filledVacuums, newVacuums };
        this.log.push(result);
        return result;
      }
      drill(sentence) {
        const tokens = this.engine.feed(sentence);
        const forward = this.engine.scoreSentence(sentence);
        const words = sentence.toLowerCase().match(/[a-z0-9]+/g) || [];
        const reversed = [...words].reverse().join(" ");
        const backward = this.engine.scoreSentence(reversed);
        const asymmetry = forward.coherence - backward.coherence;
        return { sentence, reversed, forwardCoherence: forward.coherence, backwardCoherence: backward.coherence, asymmetry, learned: asymmetry > 0.05, forwardSteps: forward.steps, backwardSteps: backward.steps };
      }
      correctAssociation(wordA, wordB, rightContext) {
        const beforeAff = this.engine.affinity(wordA, wordB);
        const ul = this.engine.unlearn(wordA, wordB);
        let fed = null;
        if (rightContext) fed = this.engine.feedText(rightContext);
        const afterAff = this.engine.affinity(wordA, wordB);
        this.corrections++;
        return { correction: this.corrections, wordA, wordB, before: beforeAff.mutual, after: afterAff.mutual, weakened: afterAff.mutual < beforeAff.mutual, unlearned: ul, fed };
      }
      plan() {
        const diag = this.diagnose();
        const steps = [];
        if (diag.starved.length > 0) {
          const targets = diag.starved.slice(0, 3).map(s => s.word);
          steps.push({ priority: 1, action: "feed_targeted", targets, instruction: `Feed sentences containing these words in varied contexts: ${targets.join(", ")}` });
        }
        if (diag.underexposed.length > 0) {
          const targets = diag.underexposed.slice(0, 5).map(u => u.word);
          steps.push({ priority: 2, action: "feed_reinforcement", targets, instruction: `These words appear often but lack depth. Feed more varied sentences containing: ${targets.join(", ")}` });
        }
        if (diag.bridges.length > 0) {
          const targets = diag.bridges.slice(0, 3).map(b => b.word);
          steps.push({ priority: 3, action: "investigate_bridges", targets, instruction: `These words bridge disconnected neighborhoods. Check: are they legitimate cross-domain words (like "treatment") or contamination? If contamination, use unlearn().` });
        }
        const structured = Object.entries(this.engine.nodes).filter(([w]) => this.engine.depth(w).level === "structured" || this.engine.depth(w).level === "deep").map(([w]) => w).slice(0, 5);
        if (structured.length >= 2) {
          steps.push({ priority: 4, action: "drill_contrastive", targets: structured, instruction: `Run contrastive drills: score "${structured[0]} ... ${structured[1]}" vs reversed. The asymmetry sharpens direction.` });
        }
        if (diag.vocab > 100) steps.push({ priority: 5, action: "decay", instruction: "Run decay(1) to prune single-occurrence noise, then re-diagnose." });
        return { diagnosis: diag, steps };
      }
      cycle(text, domain = "general") {
        const before = this.diagnose();
        const lessonResult = this.lesson(text, domain);
        const sents = text.split(/[.!?\n]+/).map(s => s.trim()).filter(s => s.length > 10);
        let drillResult = null;
        if (sents.length > 0) drillResult = this.drill(sents[0]);
        const after = this.diagnose();
        return { before: { vocab: before.vocab, depths: before.depths, needs: before.needs }, lesson: lessonResult, drill: drillResult, after: { vocab: after.vocab, depths: after.depths, needs: after.needs } };
      }
      history() { return { lessons: this.lessons, corrections: this.corrections, log: this.log.slice(-20) }; }
    }

    // --- INDEXED DB ---
    const IDB = {
      open() { return new Promise((res, rej) => { const r = indexedDB.open("shifu-v2", 1); r.onupgradeneeded = () => r.result.createObjectStore("state"); r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error); }); },
      async get(key) { const db = await this.open(); return new Promise((res, rej) => { const tx = db.transaction("state", "readonly"); const r = tx.objectStore("state").get(key); r.onsuccess = () => res(r.result || null); r.onerror = () => rej(r.error); }); },
      async set(key, val) { const db = await this.open(); return new Promise((res, rej) => { const tx = db.transaction("state", "readwrite"); tx.objectStore("state").put(val, key); tx.oncomplete = () => res(); tx.onerror = () => rej(tx.error); }); },
      async del(key) { const db = await this.open(); return new Promise((res, rej) => { const tx = db.transaction("state", "readwrite"); tx.objectStore("state").delete(key); tx.oncomplete = () => res(); tx.onerror = () => rej(tx.error); }); }
    };
  </script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const engine = new ShifuEmbryo();
    const teacher = new Teacher(engine);
    
    const depthColors = { unborn: "bg-gray-800 text-gray-400", surface: "bg-gray-700 text-gray-300", shallow: "bg-blue-900 text-blue-300", forming: "bg-yellow-900 text-yellow-300", structured: "bg-green-900 text-green-300", deep: "bg-emerald-600 text-white font-bold" };

    function App() {
      const [messages, setMessages] = useState([
        { id: 'system-1', sender: 'system', text: "Shifu v2 Teacher Loop active. Type 'help' for commands." }
      ]);
      const [input, setInput] = useState("");
      const [stats, setStats] = useState({ vocab: 0, tokens: 0 });
      const messagesEndRef = useRef(null);

      useEffect(() => {
        IDB.get('core').then(dat => {
          if (dat) {
            engine.deserialize(dat);
            setStats({ vocab: Object.keys(engine.nodes).length, tokens: engine.tokenCount });
            addSystemMsg("Restored engine state from IndexedDB.");
          }
        });
      }, []);

      useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);

      const addSystemMsg = (text, content = null) => { setMessages(m => [...m, { id: Date.now()+Math.random(), sender: 'system', text, content }]); };
      const syncDb = async () => { await IDB.set('core', engine.serialize()); setStats({ vocab: Object.keys(engine.nodes).length, tokens: engine.tokenCount }); };

      const processCommand = (text) => {
        setMessages(m => [...m, { id: Date.now(), sender: 'user', text }]);
        const txt = text.trim(), low = txt.toLowerCase();

        // 1. Core Intents
        if (low === 'help') {
          addSystemMsg("Commands:\n- `feed: [text]`\n- `explore [word]`\n- `compare [a] and [b]`\n- `score: [sentence]`\n- `pressure`, `vacuums`, `surpluses`, `bridges`\n\nTeacher Commands:\n- `diagnose`\n- `plan`\n- `lesson: [text]`\n- `drill: [sentence]`\n- `cycle: [text]`\n- `teach correct [a] and [b]` optionally with right context\n- `unlearn [a] and [b]`\n- `forget [word]`\n- `decay` or `decay [N]`\n- `history`\n- `stats`, `reset`");
        } 
        else if (low === 'stats') {
          const s = engine.stats();
          addSystemMsg(`Vocab: ${s.vocab} | Tokens: ${s.tokens}\nUnborn: ${s.depths.unborn} | Surface: ${s.depths.surface} | Shallow: ${s.depths.shallow}\nForming: ${s.depths.forming} | Structured: ${s.depths.structured} | Deep: ${s.depths.deep}`);
        } 
        else if (low === 'reset') { IDB.del('core').then(() => { location.reload() }); } 

        // 2. Teacher Loop Commands
        else if (low === 'diagnose') {
          const d = teacher.diagnose();
          addSystemMsg("Diagnosis complete.", 
            <div className="mt-2 text-xs space-y-2">
              <div className="bg-[#0e1219] p-2 rounded">
                <span className="text-[#48b89a] block font-bold mb-1">Needs</span>
                {d.needs.map((n, i) => <li key={i} className="text-gray-400">{n}</li>)}
              </div>
              <div className="bg-[#0e1219] p-2 rounded">
                <span className="text-red-400 block font-bold mb-1">Starved (Predicted but thin)</span>
                {d.starved.map(s => <span key={s.word} className="mr-2">{s.word}({s.deficit})</span>)}
              </div>
              <div className="bg-[#0e1219] p-2 rounded">
                <span className="text-blue-400 block font-bold mb-1">Underexposed (Freq>3 but Shallow)</span>
                {d.underexposed.map(s => <span key={s.word} className="mr-2">{s.word}({s.freq})</span>)}
              </div>
            </div>
          );
        }
        else if (low === 'plan') {
          const p = teacher.plan();
          addSystemMsg("Teaching Plan:", 
            <div className="mt-2 space-y-2 text-xs">
              {p.steps.map((st, i) => (
                <div key={i} className="bg-[#0e1219] p-2 border-l-2 border-[#48b89a]">
                  <span className="text-gray-300 font-bold block">P{st.priority}: {st.action.toUpperCase()}</span>
                  <span className="text-gray-500">{st.instruction}</span>
                </div>
              ))}
            </div>
          );
        }
        else if (low.startsWith('lesson: ')) {
          const r = teacher.lesson(txt.substring(8));
          syncDb();
          addSystemMsg(`Lesson #${r.lesson} complete.`, 
            <div className="mt-1 text-xs text-gray-400">
              New Words: {r.newWords} | Sentences: {r.fed.sentences} | Decayed: {r.decayed}<br/>
              Vacuums Filled: {r.filledVacuums.length} | New Vacuums: {r.newVacuums.length}
            </div>
          );
        }
        else if (low.startsWith('drill: ')) {
          const r = teacher.drill(txt.substring(7));
          syncDb();
          addSystemMsg(`Drill complete. Asymmetry: ${r.asymmetry.toFixed(4)}`, 
            <div className="mt-1 text-xs text-gray-400">
              Forward: {r.forwardCoherence.toFixed(4)} | Backward: {r.backwardCoherence.toFixed(4)}<br/>
              Did we learn? {r.learned ? <span className="text-green-400">Yes</span> : <span className="text-red-400">No</span>}
            </div>
          );
        }
        else if (low.startsWith('teach correct ') && low.includes(' and ')) {
          const args = txt.replace(/teach correct /i, '').split(' and ');
          // Handle optional context "teach correct a and b: text"
          let context = null, wordB = args[1];
          if (wordB.includes(':')) {
            const splitB = wordB.split(':');
            wordB = splitB[0].trim();
            context = splitB.slice(1).join(':').trim();
          }
          const r = teacher.correctAssociation(args[0].trim(), wordB, context);
          syncDb();
          addSystemMsg(`Corrected association between ${args[0].trim()} and ${wordB}.`,
            <div className="text-xs mt-1 text-gray-400">
              Mutual Affinity Diff: {r.before.toFixed(4)} → {r.after.toFixed(4)}<br/>
              Edges Weakened: {r.unlearned.edgesWeakened}
            </div>
          );
        }
        else if (low.startsWith('cycle: ')) {
          const r = teacher.cycle(txt.substring(7));
          syncDb();
          addSystemMsg(`Cycle complete.`, 
            <div className="mt-1 text-xs text-gray-400">
              Vocab change: {r.before.vocab} → {r.after.vocab}<br/>
              Lesson Decayed: {r.lesson.decayed} edges<br/>
              Drill Asymmetry: {r.drill ? r.drill.asymmetry.toFixed(4) : "None (sentence too short)"}
            </div>
          );
        }
        else if (low === 'history') {
          const h = teacher.history();
          addSystemMsg(`Teacher History (Lessons: ${h.lessons}, Corrections: ${h.corrections})`, 
            <div className="text-xs text-gray-500 mt-1 max-h-32 overflow-y-auto">{JSON.stringify(h.log, null, 2)}</div>
          );
        }

        // 3. Forgetting APIs
        else if (low.startsWith('unlearn ') && low.includes(' and ')) {
          const args = txt.replace(/unlearn /i, '').split(' and ');
          const r = engine.unlearn(args[0].trim(), args[1].trim());
          syncDb();
          addSystemMsg(`Unlearned ${args[0].trim()} ↔ ${args[1].trim()}: Weakened ${r.edgesWeakened} edges.`);
        }
        else if (low.startsWith('forget ')) {
          const word = txt.substring(7).trim();
          const r = engine.forget(word);
          syncDb();
          addSystemMsg(`Nuclear forget: "${word}". Node and all references erased.`);
        }
        else if (low.startsWith('decay')) {
          const thresh = parseInt(low.replace('decay', '').trim()) || 1;
          const r = engine.decay(thresh);
          syncDb();
          addSystemMsg(`Decay (threshold <= ${thresh}) executed. Removed ${r.edgesRemoved} weak edges.`);
        }

        // 4. Default / Observation Fallbacks
        else if (low.startsWith('score: ')) {
          const res = engine.scoreSentence(txt.substring(7));
          addSystemMsg(`Scoring: "${txt.substring(7)}"`, 
            <div className="mt-2 bg-[#0e1219] p-3 rounded">
              <div className="flex justify-between mb-3 text-sm text-[#48b89a]">
                <span>Coherence: {res.coherence.toFixed(4)}</span><span>Mean Surprise: {res.meanSurprise.toFixed(4)}</span>
              </div>
              <div className="space-y-1">
                {res.steps.map((st, i) => (
                  <div key={i} className="flex items-center text-xs">
                    <div className="w-24 truncate">{st.word}</div>
                    <div className="w-full bg-[#1a2130] h-3 rounded-full mx-2"><div className={`h-full ${st.surprise < 0.3 ? 'bg-green-500' : 'bg-red-500'}`} style={{width: `${Math.max(2, st.surprise * 100)}%`}}></div></div>
                  </div>
                ))}
              </div>
            </div>
          );
        }
        else if (low.startsWith('explore ') && txt.split(' ').length === 2) {
          const w = txt.split(' ')[1].toLowerCase(), depth = engine.depth(w), node = engine.nodes[w];
          if (!node) addSystemMsg(`Word unknown: ${w}`);
          else addSystemMsg(`Explore: ${w}`, <div className="mt-2 bg-[#0e1219] p-3 rounded text-xs"><span className={`px-2 py-1 rounded ${depthColors[depth.level]}`}>{depth.level}</span></div>);
        }
        else {
          addSystemMsg(`Unrecognized intent or raw feed attempt. Use 'feed: ' or 'lesson: ' for texts.`);
        }
        setInput("");
      };

      return (
        <div className="h-screen w-full flex flex-col items-center justify-center p-4">
          <div className="w-full max-w-3xl h-[90vh] glass-panel rounded-xl shadow-2xl flex flex-col overflow-hidden">
            <div className="h-14 border-b border-[#1a2130] flex items-center justify-between px-6 bg-[#0a0e14]">
              <div className="flex items-center gap-3">
                <div className="w-3 h-3 rounded-full bg-[#48b89a] animate-pulse"></div>
                <h1 className="font-serif-header text-xl tracking-wide text-[#a8b4c4]">Shifu v2 Teacher</h1>
              </div>
              <div className="text-xs font-mono text-gray-500">VOCAB: {stats.vocab} | TOKENS: {stats.tokens}</div>
            </div>
            <div className="flex-1 overflow-y-auto p-4 space-y-4">
              {messages.map((msg) => (
                <div key={msg.id} className={`flex ${msg.sender === 'user' ? 'justify-end' : 'justify-start'}`}>
                  <div className={`max-w-[85%] rounded-lg p-3 ${msg.sender === 'user' ? 'bg-[#1a2130]/50 text-white' : 'bg-[#0a0e14] border border-[#1a2130]'}`}>
                    <div className="text-sm whitespace-pre-wrap">{msg.text}</div>{msg.content}
                  </div>
                </div>
              ))}
              <div ref={messagesEndRef} />
            </div>
            <div className="p-4 bg-[#0a0e14] border-t border-[#1a2130]">
              <div className="relative">
                <input type="text" value={input} onChange={(e) => setInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && processCommand(input)} placeholder="Ask Shifu or feed a lesson..." className="w-full bg-[#0e1219] border border-[#1a2130] rounded-lg py-3 px-4 text-[#a8b4c4] focus:outline-none focus:border-[#48b89a]" />
              </div>
              <div className="flex gap-2 mt-3 text-xs text-gray-600 justify-center">
                <button className="hover:text-[#48b89a]" onClick={()=>processCommand('diagnose')}>diagnose</button><span>·</span>
                <button className="hover:text-[#48b89a]" onClick={()=>processCommand('plan')}>plan</button><span>·</span>
                <button className="hover:text-[#48b89a]" onClick={()=>processCommand('decay 1')}>decay 1</button><span>·</span>
                <button className="hover:text-[#48b89a]" onClick={()=>processCommand('drill: The doctor treats the patient')}>drill</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</head>
<body><div id="root"></div></body>
</html>
