  const sl=start.toLowerCase(),gl=goal.toLowerCase();
  if(!this.nodes[sl]||!this.nodes[gl])return{ok:false,reason:"unknown word"};

  const ws=raw.toLowerCase().replace(/_+/g,' BLANK ').match(/[a-z0-9]+|BLANK/g)||[];

  const before=blankIdx>0?ws[blankIdx-1]:null,after=blankIdx<ws.length-1?ws[blankIdx+1]:null,before2=blankIdx>1?ws[blankIdx-2]:null;

  const addScore=(w,val,src)=>{if(w==='BLANK'||context.includes(w))return;scores[w]??={word:w,total:0,signals:{}};scores[w].total+=val;scores[w].signals[src]=(scores[w].signals[src]||0)+val;};
  if(before&&this.nodes[before]?.next){const nd=this.nodes[before];const total=Object.values(nd.next).reduce((s,v)=>s+v,0);if(total>0)for(const[w,cnt]of Object.entries(nd.next))addScore(w,(cnt/total)*0.35,'fwd');}
  if(after&&this.nodes[after]?.prev){const nd=this.nodes[after];const total=Object.values(nd.prev).reduce((s,v)=>s+v,0);if(total>0)for(const[w,cnt]of Object.entries(nd.prev))addScore(w,(cnt/total)*0.25,'bwd');}

stats(){const v=Object.keys(this.nodes).length,depths={unborn:0,surface:0,shallow:0,forming:0,structured:0,deep:0};for(const w of Object.keys(this.nodes))depths[this.depth(w).level]++;return{version:VERSION,vocab:v,sentences:this.sentenceCount,tokens:this.tokenCount,depths};}
serialize(){return JSON.stringify({version:VERSION,nodes:Object.fromEntries(Object.entries(this.nodes).map(([w,n])=>[w,{chars:n.chars,freq:n.freq,firstSeen:n.firstSeen,lastSeen:n.lastSeen,positions:n.positions.slice(-200),gaps:n.gaps.slice(-100),sentLengths:n.sentLengths.slice(-100),neighbors:n.neighbors,next:n.next,prev:n.prev,next2:n.next2}])),sentenceCount:this.sentenceCount,tokenCount:this.tokenCount});}

}

// ═══════════════════════════════════════════════════════════════
// TEACHER — Closes the feedback loop (complete, from core/teacher.js)
// ═══════════════════════════════════════════════════════════════
class Teacher {
  constructor(engine){this.engine=engine;this.log=[];this.corrections=0;this.lessons=0;}
  diagnose(){
    const vacs=this.engine.vacuums(10),surps=this.engine.surpluses(10),brs=this.engine.bridges(10),st=this.engine.stats();
    const underexposed=[];for(const[w,n]of Object.entries(this.engine.nodes)){const d=this.engine.depth(w);if(n.freq>=3&&d.level==="shallow")underexposed.push({word:w,freq:n.freq,evidence:d.evidence});}underexposed.sort((a,b)=>b.freq-a.freq);
    const starved=[];for(const[w,n]of Object.entries(this.engine.nodes)){if(n.freq<2)continue;const p=this.engine.pressureOf(w);if(p&&p.pressure<0&&p.inbound>=3)starved.push({word:w,inbound:p.inbound,actual:p.actual,deficit:p.inbound-p.actual});}starved.sort((a,b)=>b.deficit-a.deficit);
    return{vocab:st.vocab,depths:st.depths,vacuums:vacs,surpluses:surps,bridges:brs,underexposed:underexposed.slice(0,10),starved:starved.slice(0,10),needs:this._prescribe(vacs,underexposed,starved,brs,st)};}
  _prescribe(vacs,underexposed,starved,bridges,st){
    const needs=[];if(st.vocab===0){needs.push("Empty engine. Feed any text to begin.");return needs;}
    if(st.depths.deep<3)needs.push("Very few deep words. Feed more repeated sentences.");
    if(underexposed.length>5)needs.push(underexposed.length+" words seen 3+ times but still shallow: "+underexposed.slice(0,5).map(w=>w.word).join(", "));
    if(starved.length>0)needs.push(starved.length+" words predicted but structurally thin: "+starved.slice(0,5).map(w=>w.word).join(", "));
    if(bridges.length>0)needs.push(bridges.length+" bridge words: "+bridges.slice(0,3).map(b=>b.word).join(", "));
    if(!needs.length)needs.push("Engine balanced. Feed new domain text or run drills.");return needs;}
  lesson(text,domain="general"){const before=this.engine.stats();const fed=this.engine.feedText(text);const decayed=before.vocab>50?this.engine.decay(1):{edgesRemoved:0};const after=this.engine.stats();const newWords=after.vocab-before.vocab;const newDepths={};for(const l of Object.keys(after.depths))newDepths[l]=after.depths[l]-before.depths[l];const textWords=text.toLowerCase().match(/[a-z0-9]+/g)||[];const newVacuums=[];for(const w of new Set(textWords)){const p=this.engine.pressureOf(w);if(p&&p.pressure<0)newVacuums.push(w);}this.lessons++;const result={lesson:this.lessons,domain,fed,newWords,newDepths,decayed:decayed.edgesRemoved,newVacuums};this.log.push(result);return result;}
  drill(sentence){const tokens=this.engine.feed(sentence);const forward=this.engine.scoreSentence(sentence);const words=sentence.toLowerCase().match(/[a-z0-9]+/g)||[];const reversed=[...words].reverse().join(" ");const backward=this.engine.scoreSentence(reversed);const asymmetry=forward.coherence-backward.coherence;return{sentence,reversed,forwardCoherence:forward.coherence,backwardCoherence:backward.coherence,asymmetry,learned:asymmetry>0.05};}
  correctAssociation(wordA,wordB,rightContext){const beforeAff=this.engine.affinity(wordA,wordB);const ul=this.engine.unlearn(wordA,wordB);let fed=null;if(rightContext)fed=this.engine.feedText(rightContext);const afterAff=this.engine.affinity(wordA,wordB);this.corrections++;return{correction:this.corrections,wordA,wordB,before:beforeAff.mutual,after:afterAff.mutual,weakened:afterAff.mutual<beforeAff.mutual,unlearned:ul,fed};}
  plan(){const diag=this.diagnose();const steps=[];
    if(diag.starved.length>0){const t=diag.starved.slice(0,3).map(s=>s.word);steps.push({priority:1,action:"feed_targeted",targets:t,instruction:"Feed sentences with: "+t.join(", ")});}
    if(diag.underexposed.length>0){const t=diag.underexposed.slice(0,5).map(u=>u.word);steps.push({priority:2,action:"reinforce",targets:t,instruction:"Reinforce shallow words: "+t.join(", ")});}
    if(diag.bridges.length>0){const t=diag.bridges.slice(0,3).map(b=>b.word);steps.push({priority:3,action:"investigate_bridges",targets:t,instruction:"Check bridges for contamination: "+t.join(", ")});}
    const structured=Object.entries(this.engine.nodes).filter(([w])=>{const d=this.engine.depth(w);return d.level==="structured"||d.level==="deep";}).map(([w])=>w).slice(0,5);
    if(structured.length>=2)steps.push({priority:4,action:"drill",targets:structured,instruction:"Contrastive drills on: "+structured.slice(0,3).join(", ")});
    if(diag.vocab>100)steps.push({priority:5,action:"decay",instruction:"Run decay(1) to prune noise."});
    return{diagnosis:diag,steps};}
  cycle(text,domain="general"){const before=this.diagnose();const lessonResult=this.lesson(text,domain);const sents=text.split(/[.!?\n]+/).map(s=>s.trim()).filter(s=>s.length>10);let drillResult=null;if(sents.length>0)drillResult=this.drill(sents[0]);const after=this.diagnose();return{before:{vocab:before.vocab,depths:before.depths,needs:before.needs},lesson:lessonResult,drill:drillResult,after:{vocab:after.vocab,depths:after.depths,needs:after.needs}};}
  spontaneous(){
    const eng=this.engine;if(Object.keys(eng.nodes).length<10)return{action:"wait",reason:"too few words"};
    const diag=this.diagnose();const actions=[];
    for(const s of diag.starved.slice(0,3)){const g=this._walkFrom(s.word,8);if(g){eng.feed(g);actions.push({type:"reinforce",word:s.word,sentence:g});}}
    for(const u of diag.underexposed.slice(0,3)){const g=this._walkFrom(u.word,8);if(g){eng.feed(g);actions.push({type:"reinforce",word:u.word,sentence:g});}}
    if(diag.surpluses.length>0&&diag.vacuums.length>0){const src=diag.surpluses[0].word,dst=diag.vacuums[0].word;const b=this._walkBetween(src,dst,10);if(b){eng.feed(b);actions.push({type:"bridge",from:src,to:dst,sentence:b});}}
    const structured=Object.keys(eng.nodes).filter(w=>{const d=eng.depth(w);return d.level==="structured"||d.level==="deep";});
    let drillResult=null;if(structured.length>=2){const a=structured[Math.floor(Math.random()*structured.length)];const s=this._walkFrom(a,6);if(s)drillResult=this.drill(s);}
    const decayed=eng.decay(1);this.lessons++;
    const result={action:"spontaneous",lesson:this.lessons,generated:actions,drill:drillResult,decayed:decayed.edgesRemoved,vocab:Object.keys(eng.nodes).length};
    this.log.push(result);return result;}
  _walkFrom(start,maxLen){const eng=this.engine,node=eng.nodes[start];if(!node)return null;const words=[start];let current=start;
    for(let i=0;i<maxLen-1;i++){const nd=eng.nodes[current];if(!nd||!nd.next||!Object.keys(nd.next).length)break;const entries=Object.entries(nd.next);const total=entries.reduce((s,[,w])=>s+w,0);let r=Math.random()*total,picked=entries[0][0];for(const[word,weight]of entries){r-=weight;if(r<=0){picked=word;break;}}if(words.includes(picked)&&words.length>2)break;words.push(picked);current=picked;}
    return words.length>=3?words.join(" "):null;}
  _walkBetween(src,dst,maxLen){const eng=this.engine;if(!eng.nodes[src]||!eng.nodes[dst])return null;const words=[src];let current=src;
    for(let i=0;i<maxLen-1;i++){const nd=eng.nodes[current];if(!nd?.next)break;if(nd.next[dst]){words.push(dst);break;}const dstNb=new Set(Object.keys(eng.nodes[dst]?.neighbors||{}));let bestWord=null,bestScore=-1;for(const[c,weight]of Object.entries(nd.next)){if(words.includes(c))continue;const cNb=Object.keys(eng.nodes[c]?.neighbors||{});const overlap=cNb.filter(w=>dstNb.has(w)).length;const score=overlap+weight*0.1;if(score>bestScore){bestScore=score;bestWord=c;}}if(!bestWord)break;words.push(bestWord);current=bestWord;}
    return words.length>=3?words.join(" "):null;}
  history(){return{lessons:this.lessons,corrections:this.corrections,log:this.log.slice(-20)};}
}

// ═══════════════════════════════════════════════════════════════
// IndexedDB persistence
// ═══════════════════════════════════════════════════════════════
const IDB={
  open(){return new Promise((res,rej)=>{const r=indexedDB.open("shifu-v2",1);r.onupgradeneeded=()=>r.result.createObjectStore("state");r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});},
  async get(key){const db=await this.open();return new Promise((res,rej)=>{const tx=db.transaction("state","readonly");const r=tx.objectStore("state").get(key);r.onsuccess=()=>res(r.result||null);r.onerror=()=>rej(r.error);});},
  async set(key,val){const db=await this.open();return new Promise((res,rej)=>{const tx=db.transaction("state","readwrite");tx.objectStore("state").put(val,key);tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);});},
  async del(key){const db=await this.open();return new Promise((res,rej)=>{const tx=db.transaction("state","readwrite");tx.objectStore("state").delete(key);tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);});}
};

  <script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const engine = new ShifuEmbryo();
const teacher = new Teacher(engine);

const DC = { unborn:"depth-unborn", surface:"depth-surface", shallow:"depth-shallow", forming:"depth-forming", structured:"depth-structured", deep:"depth-deep" };

// ─── Signal bar component ───────────────────────────────────
function Bar({label, value, max=1, color="bar-green"}) {
  const pct = Math.max(1, Math.min(100, (value/max)*100));
  return <div className="flex items-center gap-2 text-[10px]">
    <span className="w-20 text-right text-gray-500 truncate">{label}</span>
    <div className="flex-1 bar-bg h-2 rounded-full"><div className={`h-full rounded-full ${color}`} style={{width:pct+"%"}}></div></div>
    <span className="w-12 text-gray-500">{typeof value==='number'?value.toFixed(3):value}</span>
  </div>;
}

function DepthBadge({word}) {
  const d = engine.depth(word);
  return <span className={`px-2 py-0.5 rounded text-[10px] ${DC[d.level]||DC.unborn}`}>{d.level} ({d.evidence.toFixed(2)})</span>;
}

function App() {
  const [messages, setMessages] = useState([{id:'s0',sender:'system',text:"Shifu v2 Embryo Engine ready. Type 'help' or start feeding text."}]);
  const [input, setInput] = useState("");
  const [stats, setStats] = useState({vocab:0,tokens:0,sentences:0});
  const [autoTeach, setAutoTeach] = useState(false);
  const [autoCount, setAutoCount] = useState(0);
  const autoRef = useRef(null);
  const endRef = useRef(null);

  // Load from IndexedDB, or fetch trained brain from server
  useEffect(()=>{IDB.get('engine').then(async d=>{if(d){engine.deserialize(d);refresh();addMsg('system',"Restored: "+engine.stats().vocab+" words from IndexedDB.");}else{try{addMsg('system','Loading trained brain from server...');const r=await fetch('/state');if(r.ok){const json=await r.text();engine.deserialize(json);await IDB.set('engine',json);refresh();addMsg('system',"Loaded trained brain: "+engine.stats().vocab+" words ("+Math.round(json.length/1024/1024)+"MB)");}}catch(e){addMsg('system','No pre-trained brain found. Starting empty.');}}});},[]);
  useEffect(()=>{endRef.current?.scrollIntoView({behavior:'smooth'});},[messages]);

  const refresh = () => { const s=engine.stats(); setStats({vocab:s.vocab,tokens:s.tokenCount,sentences:s.sentences}); };
  const save = async () => { await IDB.set('engine',engine.serialize()); refresh(); };

  const addMsg = (sender, text, content=null) => {
    setMessages(m=>[...m, {id:Date.now()+'-'+Math.random(), sender, text, content}]);
  };

  // ─── Auto-teach loop ────────────────────────────────────
  useEffect(()=>{
    if(autoTeach){
      autoRef.current = setInterval(()=>{
        const r = teacher.spontaneous();
        if(r.action==="wait"){addMsg('auto',"Waiting... "+r.reason);return;}
        save();
        setAutoCount(c=>c+1);
        const genText = r.generated.map(g=>`${g.type}: "${g.sentence}"`).join('\n');
        addMsg('auto', `Spontaneous #${r.lesson}`, <div className="mt-1 text-[10px] space-y-1">
          <div className="text-gray-500">Generated {r.generated.length} sentences, decayed {r.decayed} edges</div>
          {r.generated.map((g,i)=><div key={i} className="text-gray-400"><span className="text-[#48b89a]">{g.type}</span> [{g.word||g.from}]: {g.sentence}</div>)}
          {r.drill && <div className="text-gray-400">Drill asymmetry: {r.drill.asymmetry.toFixed(3)} {r.drill.learned?'(learned)':'(not yet)'}</div>}
          <div className="text-gray-500">Vocab: {r.vocab}</div>
        </div>);
      }, 2000);
    } else { if(autoRef.current)clearInterval(autoRef.current); }
    return ()=>{if(autoRef.current)clearInterval(autoRef.current);};
  },[autoTeach]);

  // ─── Command router ─────────────────────────────────────
  const exec = useCallback((txt)=>{
    if(!txt.trim())return;
    setMessages(m=>[...m,{id:Date.now(),sender:'user',text:txt}]);
    const low = txt.trim().toLowerCase();

    // HELP
    if(low==='help'){
      addMsg('system',
`Commands:
  feed: [text]         — learn text
  explore [word]       — depth, neighbors, next words, similar
  similar [word]       — most related words
  compare [a] and [b]  — asymmetric comparison
  affinity [a] and [b] — pre-contact attraction
  query: [... _ ...]   — fill the blank
  path [a] to [b]      — least-action route
  generate [word]      — random walk from word
  score: [sentence]    — word-by-word surprise
  correct [text]       — OCR correction

Pressure:
  pressure / vacuums / surpluses / bridges / tensions

Teaching:
  diagnose / plan / lesson: [text] / drill: [sentence]
  cycle: [text] / teach correct [a] and [b]
  history / spontaneous

Forgetting:
  unlearn [a] and [b] / forget [word] / decay [N]
  collapse [word]

  stats / reset`);
    }

    // STATS
    else if(low==='stats'){
      const s=engine.stats();
      addMsg('system', `Vocab: ${s.vocab} | Tokens: ${s.tokens} | Sentences: ${s.sentences}`, <div className="mt-2 grid grid-cols-6 gap-1 text-[10px]">
        {Object.entries(s.depths).map(([k,v])=><div key={k} className={`text-center py-1 rounded ${DC[k]}`}>{k}<br/>{v}</div>)}
      </div>);
    }

    // RESET
    else if(low==='reset'){ IDB.del('engine').then(()=>location.reload()); }

    // FEED
    else if(low.startsWith('feed:') || low.startsWith('feed ')){
      const text = txt.substring(txt.indexOf(':')+1 < 6 ? 5 : txt.indexOf(':')+1).trim();
      const r = engine.feedText(text); save();
      addMsg('system', `Fed ${r.sentences} sentences, ${r.tokens} tokens. Vocab: ${Object.keys(engine.nodes).length}`);
    }

    // EXPLORE
    else if(low.startsWith('explore ')){
      const w = low.split(/\s+/)[1];
      const node = engine.nodes[w];
      if(!node){ addMsg('system',`"${w}" is unborn.`); }
      else {
        const d = engine.depth(w);
        const topNbr = Object.entries(node.neighbors).sort((a,b)=>b[1]-a[1]).slice(0,10);
        const topNext = Object.entries(node.next).sort((a,b)=>b[1]-a[1]).slice(0,8);
        const topPrev = Object.entries(node.prev).sort((a,b)=>b[1]-a[1]).slice(0,5);
        const sim = engine.similar(w,5);
        const p = engine.pressureOf(w);
        addMsg('system', `Explore: ${w}`, <div className="mt-2 space-y-2 text-[10px]">
          <div className="flex items-center gap-2"><DepthBadge word={w}/><span className="text-gray-500">freq:{node.freq} | pressure:{p?.pressure}</span></div>
          <div className="bg-[#0d1117] p-2 rounded">
            <div className="text-[#48b89a] mb-1">Neighbors ({Object.keys(node.neighbors).length})</div>
            <div className="flex flex-wrap gap-1">{topNbr.map(([n,c])=><span key={n} className="px-1 bg-[#1a2130] rounded">{n}<span className="text-gray-600">:{c}</span></span>)}</div>
          </div>
          <div className="bg-[#0d1117] p-2 rounded">
            <div className="text-[#4a8db7] mb-1">Next words</div>
            <div className="flex flex-wrap gap-1">{topNext.map(([n,c])=><span key={n} className="px-1 bg-[#1a2130] rounded">{n}<span className="text-gray-600">:{c}</span></span>)}</div>
          </div>
          {topPrev.length>0 && <div className="bg-[#0d1117] p-2 rounded">
            <div className="text-[#d4a843] mb-1">Prev words</div>
            <div className="flex flex-wrap gap-1">{topPrev.map(([n,c])=><span key={n} className="px-1 bg-[#1a2130] rounded">{n}<span className="text-gray-600">:{c}</span></span>)}</div>
          </div>}
          {sim.length>0 && <div className="bg-[#0d1117] p-2 rounded">
            <div className="text-gray-400 mb-1">Similar</div>
            {sim.map(s=><div key={s.word} className="flex items-center gap-1"><DepthBadge word={s.word}/><span>{s.word}</span><span className="text-gray-600">{(s.similarity*100).toFixed(1)}%</span></div>)}
          </div>}
        </div>);
      }
    }

    // SIMILAR
    else if(low.startsWith('similar ')){
      const w = low.split(/\s+/)[1];
      const sim = engine.similar(w,10);
      if(!sim.length) addMsg('system',`"${w}" unknown or no similar words.`);
      else addMsg('system', `Similar to "${w}":`, <div className="mt-1 space-y-1 text-[10px]">
        {sim.map(s=><div key={s.word} className="flex items-center gap-2"><DepthBadge word={s.word}/><span className="w-24">{s.word}</span><div className="flex-1 bar-bg h-2 rounded-full"><div className="bar-green h-full rounded-full" style={{width:(s.similarity*100)+"%"}}></div></div><span className="text-gray-500 w-12">{(s.similarity*100).toFixed(1)}%</span></div>)}
      </div>);
    }

    // COMPARE
    else if(low.startsWith('compare ')&&low.includes(' and ')){
      const parts=txt.replace(/compare\s+/i,'').split(/\s+and\s+/);
      const a=parts[0].trim().toLowerCase(), b=parts[1].trim().toLowerCase();
      const r=engine.compare(a,b);
      addMsg('system', `Compare: ${a} vs ${b}`, <div className="mt-2 space-y-1 text-[10px]">
        <div className="flex gap-2 mb-2"><DepthBadge word={a}/><span className="text-gray-500">vs</span><DepthBadge word={b}/><span className="text-[#48b89a] ml-auto">{(r.similarity*100).toFixed(1)}% ({r.depth})</span></div>
        {r.signals.neighborOverlap!==undefined && <Bar label="neighbors" value={r.signals.neighborOverlap} color="bar-green"/>}
        {r.signals.expectsAB!==undefined && <Bar label={a+"->"+b} value={r.signals.expectsAB} color="bar-blue"/>}
        {r.signals.expectsBA!==undefined && <Bar label={b+"->"+a} value={r.signals.expectsBA} color="bar-yellow"/>}
        {r.signals.trajectoryAB!==undefined && <Bar label="traj A->B" value={r.signals.trajectoryAB} color="bar-blue"/>}
        {r.signals.trajectoryBA!==undefined && <Bar label="traj B->A" value={r.signals.trajectoryBA} color="bar-yellow"/>}
        {r.signals.indirectAB!==undefined && <Bar label="indirect" value={r.signals.indirectAB} color="bar-green"/>}
        {r.signals.posSim!==undefined && <Bar label="position" value={r.signals.posSim} color="bar-green"/>}
        <Bar label="edit" value={r.signals.editSim} color="bar-green"/>
        <Bar label="ocr" value={r.signals.ocrSim} color="bar-green"/>
      </div>);
    }

    // AFFINITY
    else if(low.startsWith('affinity ')&&low.includes(' and ')){
      const parts=txt.replace(/affinity\s+/i,'').split(/\s+and\s+/);
      const a=parts[0].trim(), b=parts[1].trim();
      const r=engine.affinity(a,b);
      if(!r.known){ addMsg('system',`One or both words unknown.`); }
      else addMsg('system', `Affinity: ${a} <-> ${b}`, <div className="mt-2 space-y-1 text-[10px]">
        <div className="text-[#48b89a] mb-1">Mutual: {(r.mutual*100).toFixed(1)}% | Asym: {(r.asym*100).toFixed(1)}%</div>
        <Bar label="orbit" value={r.orbit} color="bar-green"/>
        <Bar label={"pull "+a+"->"} value={r.pullAB} color="bar-blue"/>
        <Bar label={"pull "+b+"->"} value={r.pullBA} color="bar-yellow"/>
        <Bar label={"ind "+a+"->"} value={r.indAB} color="bar-blue"/>
        <Bar label={"ind "+b+"->"} value={r.indBA} color="bar-yellow"/>
        <Bar label="charSim" value={r.charSim} color="bar-green"/>
        <Bar label="expOvlp" value={r.expOvlp} color="bar-green"/>
        <Bar label="posAlign" value={r.posAlign} color="bar-green"/>
      </div>);
    }

    // QUERY
    else if(low.startsWith('query:') || low.startsWith('query ')){
      const q = txt.substring(txt.indexOf(':')+1 < 7 ? 6 : txt.indexOf(':')+1).trim();
      const r = engine.query(q);
      if(!r.ok){ addMsg('system', r.reason); }
      else addMsg('system', `Query: ${q}`, <div className="mt-2 text-[10px] space-y-1">
        <div className="text-[#48b89a] text-sm mb-1">{r.filled}</div>
        <div className="text-gray-500">Coherence: {r.coherence.toFixed(3)}</div>
        {r.candidates.map((c,i)=><div key={c.word} className="flex items-center gap-2">
          <span className={`w-4 text-right ${i===0?'text-[#48b89a]':'text-gray-600'}`}>{i+1}</span>
          <span className="w-24">{c.word}</span>
          <div className="flex-1 bar-bg h-2 rounded-full"><div className="bar-green h-full rounded-full" style={{width:Math.min(100,c.total*200)+"%"}}></div></div>
          <span className="text-gray-600 w-20">{Object.entries(c.signals).map(([k,v])=>k+':'+v.toFixed(2)).join(' ')}</span>
        </div>)}
      </div>);
    }

    // PATH
    else if(low.startsWith('path ')&&(low.includes(' to ')||low.includes(' -> '))){
      const parts=txt.replace(/path\s+/i,'').split(/\s+to\s+|\s*->\s*/);
      const a=parts[0].trim(), b=parts[1].trim();
      const r=engine.path(a,b);
      if(!r.ok){ addMsg('system', r.reason); }
      else addMsg('system', `Path: ${a} -> ${b}`, <div className="mt-2 text-[10px]">
        <div className="text-[#48b89a] text-sm mb-1">{r.text}</div>
        <div className="text-gray-500">Energy: {r.energy.toFixed(3)} | Coherence: {r.coherence.toFixed(3)} | Hops: {r.words.length}</div>
        <div className="flex items-center gap-1 mt-1 flex-wrap">
          {r.words.map((w,i)=><React.Fragment key={i}>{i>0&&<span className="text-gray-600">-></span>}<DepthBadge word={w}/></React.Fragment>)}
        </div>
      </div>);
    }

    // GENERATE
    else if(low.startsWith('generate')){
      const w = low.split(/\s+/)[1] || null;
      const r = engine.generate(w);
      addMsg('system', `Generate from "${w||'random'}":`, <div className="mt-1 text-[10px]">
        <div className="text-[#48b89a] text-sm">{r.text}</div>
        <div className="text-gray-500 mt-1">Coherence: {r.coherence?.toFixed(3)||'n/a'}</div>
      </div>);
    }

    // SCORE
    else if(low.startsWith('score:')||low.startsWith('score ')){
      const s = txt.substring(txt.indexOf(':')+1 < 7 ? 6 : txt.indexOf(':')+1).trim();
      const r = engine.scoreSentence(s);
      addMsg('system', `Score: "${s}"`, <div className="mt-2 bg-[#0d1117] p-3 rounded text-[10px]">
        <div className="flex justify-between mb-2 text-[#48b89a]">
          <span>Coherence: {r.coherence.toFixed(3)}</span><span>Mean Surprise: {r.meanSurprise.toFixed(3)}</span>
        </div>
        <div className="space-y-1">{r.steps.map((st,i)=><div key={i} className="flex items-center gap-1">
          <span className="w-24 truncate text-gray-400">{st.word}{st.afGate>0.1?<span className="text-yellow-500 ml-0.5">*</span>:''}</span>
          <div className="flex-1 bar-bg h-2.5 rounded-full"><div className={`h-full rounded-full ${st.surprise<0.3?'bar-green':st.surprise<0.7?'bar-yellow':'bar-red'}`} style={{width:Math.max(2,st.surprise*100)+"%"}}></div></div>
          <span className="w-10 text-gray-600">{st.surprise.toFixed(2)}</span>
        </div>)}</div>
      </div>);
    }

    // CORRECT
    else if(low.startsWith('correct ')){
      const w = txt.substring(8).trim();
      const r = engine.correct(w);
      addMsg('system', `Correct: "${w}"`, <div className="mt-1 text-[10px] space-y-1">
        <div className="text-gray-500">Confidence: {r.confidence.toFixed(3)}</div>
        {r.candidates.map((c,i)=><div key={c.word} className="flex items-center gap-2">
          <span className={i===0?'text-[#48b89a]':'text-gray-500'}>{c.word}</span>
          <span className="text-gray-600">{(c.score*100).toFixed(1)}%</span>
        </div>)}
      </div>);
    }

    // PRESSURE / VACUUMS / SURPLUSES / BRIDGES / TENSIONS
    else if(low==='pressure'||low==='vacuums'||low==='surpluses'||low==='bridges'||low==='tensions'){
      let items;
      if(low==='pressure') items=engine.pressure().slice(0,15);
      else if(low==='vacuums') items=engine.vacuums(10);
      else if(low==='surpluses') items=engine.surpluses(10);
      else if(low==='bridges') items=engine.bridges(10);
      else items=engine.tensions(10);

      if(low==='tensions'){
        addMsg('system', `Tensions (${items.length} split words):`, <div className="mt-1 text-[10px] space-y-1">
          {items.map(t=><div key={t.word} className="bg-[#0d1117] p-2 rounded">
            <span className="text-[#e05252]">{t.word}</span> <span className="text-gray-500">({t.components} clusters, tension:{t.tension.toFixed(2)})</span>
            <div className="flex gap-2 mt-1">{t.clusters.map((c,i)=><span key={i} className="text-gray-400">[{c.join(', ')}]</span>)}</div>
          </div>)}
          {!items.length && <span className="text-gray-500">No tensions detected.</span>}
        </div>);
      } else {
        const maxP = Math.max(...items.map(p=>Math.abs(p.pressure||0)),1);
        addMsg('system', low.charAt(0).toUpperCase()+low.slice(1)+':', <div className="mt-1 text-[10px] space-y-1">
          {items.map(p=><div key={p.word} className="flex items-center gap-1">
            <DepthBadge word={p.word}/>
            <span className="w-20 truncate">{p.word}</span>
            <div className="flex-1 bar-bg h-2 rounded-full"><div className={`h-full rounded-full ${p.pressure<0?'bar-red':'bar-green'}`} style={{width:Math.max(2,Math.abs(p.pressure)/maxP*100)+"%"}}></div></div>
            <span className="w-10 text-gray-500">{p.pressure}</span>
            <span className="w-14 text-gray-600">cl:{p.closure?.toFixed(2)}</span>
          </div>)}
          {!items.length && <span className="text-gray-500">None found.</span>}
        </div>);
      }
    }

    // DIAGNOSE
    else if(low==='diagnose'){
      const d=teacher.diagnose();
      addMsg('system','Diagnosis:', <div className="mt-2 text-[10px] space-y-2">
        <div className="bg-[#0d1117] p-2 rounded"><span className="text-[#48b89a] block mb-1">Needs</span>{d.needs.map((n,i)=><div key={i} className="text-gray-400">- {n}</div>)}</div>
        {d.starved.length>0 && <div className="bg-[#0d1117] p-2 rounded"><span className="text-red-400 block mb-1">Starved (predicted but thin)</span><div className="flex flex-wrap gap-1">{d.starved.map(s=><span key={s.word} className="px-1 bg-[#1a2130] rounded">{s.word}<span className="text-gray-600"> deficit:{s.deficit}</span></span>)}</div></div>}
        {d.underexposed.length>0 && <div className="bg-[#0d1117] p-2 rounded"><span className="text-blue-400 block mb-1">Underexposed (freq>3, shallow)</span><div className="flex flex-wrap gap-1">{d.underexposed.map(s=><span key={s.word} className="px-1 bg-[#1a2130] rounded">{s.word}<span className="text-gray-600"> f:{s.freq}</span></span>)}</div></div>}
      </div>);
    }

    // PLAN
    else if(low==='plan'){
      const p=teacher.plan();
      addMsg('system','Teaching Plan:', <div className="mt-2 space-y-1 text-[10px]">
        {p.steps.map((s,i)=><div key={i} className="bg-[#0d1117] p-2 border-l-2 border-[#48b89a] rounded-r">
          <span className="text-[#48b89a]">P{s.priority}</span> <span className="text-gray-300">{s.action}</span>
          <div className="text-gray-500 mt-0.5">{s.instruction}</div>
        </div>)}
        {!p.steps.length && <span className="text-gray-500">No steps needed.</span>}
      </div>);
    }

    // LESSON
    else if(low.startsWith('lesson:')||low.startsWith('lesson ')){
      const text=txt.substring(txt.indexOf(':')+1<8?7:txt.indexOf(':')+1).trim();
      const r=teacher.lesson(text); save();
      addMsg('system',`Lesson #${r.lesson}`, <div className="mt-1 text-[10px] text-gray-400">
        +{r.newWords} words | {r.fed.sentences} sentences | decayed: {r.decayed}
        {r.newVacuums.length>0 && <span className="text-red-400"> | new vacuums: {r.newVacuums.join(', ')}</span>}
      </div>);
    }

    // DRILL
    else if(low.startsWith('drill:')||low.startsWith('drill ')){
      const s=txt.substring(txt.indexOf(':')+1<7?6:txt.indexOf(':')+1).trim();
      const r=teacher.drill(s); save();
      addMsg('system',`Drill: asymmetry ${r.asymmetry.toFixed(3)}`, <div className="mt-1 text-[10px]">
        <div className="text-gray-400">Forward: {r.forwardCoherence.toFixed(3)} | Backward: {r.backwardCoherence.toFixed(3)}</div>
        <div className={r.learned?'text-[#48b89a]':'text-[#e05252]'}>{r.learned?'Direction learned':'Not yet learned'}</div>
      </div>);
    }

    // CYCLE
    else if(low.startsWith('cycle:')||low.startsWith('cycle ')){
      const text=txt.substring(txt.indexOf(':')+1<7?6:txt.indexOf(':')+1).trim();
      const r=teacher.cycle(text); save();
      addMsg('system','Cycle complete.', <div className="mt-1 text-[10px] text-gray-400">
        Vocab: {r.before.vocab} -> {r.after.vocab} | Decayed: {r.lesson.decayed}
        {r.drill && <span> | Drill asym: {r.drill.asymmetry.toFixed(3)}</span>}
      </div>);
    }

    // SPONTANEOUS
    else if(low==='spontaneous'){
      const r=teacher.spontaneous(); save();
      addMsg('system',`Spontaneous #${r.lesson}`, <div className="mt-1 text-[10px] space-y-1">
        {r.generated.map((g,i)=><div key={i} className="text-gray-400"><span className="text-[#48b89a]">{g.type}</span> [{g.word||g.from}]: {g.sentence}</div>)}
        {r.drill && <div className="text-gray-400">Drill asym: {r.drill.asymmetry.toFixed(3)}</div>}
        <div className="text-gray-500">Decayed: {r.decayed} | Vocab: {r.vocab}</div>
      </div>);
    }

    // TEACH CORRECT
    else if(low.startsWith('teach correct ')&&low.includes(' and ')){
      const args=txt.replace(/teach correct /i,'').split(' and ');
      let ctx=null,wordB=args[1];
      if(wordB.includes(':')){const sp=wordB.split(':');wordB=sp[0].trim();ctx=sp.slice(1).join(':').trim();}
      const r=teacher.correctAssociation(args[0].trim(),wordB,ctx); save();
      addMsg('system',`Corrected: ${args[0].trim()} <-> ${wordB}`, <div className="mt-1 text-[10px] text-gray-400">
        Affinity: {r.before.toFixed(3)} -> {r.after.toFixed(3)} | Weakened: {r.weakened?'yes':'no'}
      </div>);
    }

    // HISTORY
    else if(low==='history'){
      const h=teacher.history();
      addMsg('system',`Lessons: ${h.lessons} | Corrections: ${h.corrections}`, <div className="mt-1 text-[10px] text-gray-500 max-h-40 overflow-y-auto whitespace-pre-wrap">{JSON.stringify(h.log.slice(-5),null,1)}</div>);
    }

    // UNLEARN
    else if(low.startsWith('unlearn ')&&low.includes(' and ')){
      const parts=txt.replace(/unlearn /i,'').split(' and ');
      const r=engine.unlearn(parts[0].trim(),parts[1].trim()); save();
      addMsg('system',`Unlearn: weakened ${r.edgesWeakened} edges between ${parts[0].trim()} and ${parts[1].trim()}.`);
    }

    // FORGET
    else if(low.startsWith('forget ')){
      const w=txt.substring(7).trim();engine.forget(w); save();
      addMsg('system',`Forgot "${w}". Node and all references removed.`);
    }

    // DECAY
    else if(low.startsWith('decay')){
      const thresh=parseInt(low.replace('decay','').trim())||1;
      const r=engine.decay(thresh); save();
      addMsg('system',`Decay (threshold <= ${thresh}): removed ${r.edgesRemoved} edges.`);
    }

    // COLLAPSE
    else if(low.startsWith('collapse ')){
      const w=txt.substring(9).trim();
      const r=engine.collapse(w); save();
      if(!r.ok) addMsg('system',`Collapse "${w}": ${r.reason}`);
      else addMsg('system',`Collapsed "${w}": kept ${r.kept}, pruned ${r.pruned}`, <div className="mt-1 text-[10px] text-gray-400">
        Surviving: {r.surviving.join(', ')}<br/>Removed: {r.removed.map(c=>c.join(',')).join(' | ')}
      </div>);
    }

    // SINGLE WORD -> explore
    else if(low.match(/^[a-z]+$/) && engine.nodes[low]){
      exec('explore '+low);return;
    }

    // FALLBACK: try to feed
    else if(txt.trim().split(/\s+/).length >= 3){
      const r=engine.feedText(txt.trim()); save();
      addMsg('system',`Fed: ${r.sentences} sentences, ${r.tokens} tokens.`);
    }

    else { addMsg('system',"Unknown command. Type 'help'."); }

    setInput("");
  },[]);

  return (
    <div className="h-screen w-full flex flex-col items-center justify-center p-2">
      <div className="w-full max-w-3xl h-[95vh] glass-panel rounded-xl shadow-2xl flex flex-col overflow-hidden">
        {/* HEADER */}
        <div className="h-12 border-b border-[#1a2130] flex items-center justify-between px-4 bg-[#0a0e14] shrink-0">
          <div className="flex items-center gap-3">
            <div className={`w-2.5 h-2.5 rounded-full ${autoTeach?'bg-[#48b89a] pulse':'bg-gray-600'}`}></div>
            <h1 className="font-serif-header text-lg tracking-wide">Shifu v2</h1>
            <span className="text-[10px] text-gray-600">embryo engine</span>
          </div>
          <div className="flex items-center gap-4 text-[10px]">
            <button onClick={()=>setAutoTeach(!autoTeach)} className={`px-2 py-1 rounded border ${autoTeach?'border-[#48b89a] text-[#48b89a]':'border-[#1a2130] text-gray-600 hover:text-gray-400'}`}>
              {autoTeach?'AUTO ON ('+autoCount+')':'AUTO OFF'}
            </button>
            <span className="text-gray-500 font-mono">{stats.vocab}w {stats.tokens}t {stats.sentences}s</span>
          </div>
        </div>

        {/* MESSAGES */}
        <div className="flex-1 overflow-y-auto p-3 space-y-2">
          {messages.map(msg=>(
            <div key={msg.id} className={`flex ${msg.sender==='user'?'justify-end':'justify-start'}`}>
              <div className={`max-w-[90%] rounded-lg p-2.5 ${
                msg.sender==='user'?'bg-[#1a2840] text-white':
                msg.sender==='auto'?'bg-[#0d1117] border border-[#1a3020]':
                'bg-[#0a0e14] border border-[#1a2130]'}`}>
                {msg.sender==='auto'&&<span className="text-[9px] text-[#48b89a] block mb-0.5">AUTO-TEACH</span>}
                <div className="text-xs whitespace-pre-wrap">{msg.text}</div>
                {msg.content}
              </div>
            </div>
          ))}
          <div ref={endRef}/>
        </div>

        {/* INPUT */}
        <div className="p-3 bg-[#0a0e14] border-t border-[#1a2130] shrink-0">
          <input type="text" value={input} onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter'){exec(input);setInput('');}}}
            placeholder="feed text, explore word, query: doctor _ patient, or 'help'"
            className="w-full bg-[#0e1219] border border-[#1a2130] rounded-lg py-2.5 px-3 text-sm text-[#a8b4c4] focus:outline-none focus:border-[#48b89a]"/>
          <div className="flex gap-2 mt-2 text-[10px] text-gray-600 justify-center flex-wrap">
            {['diagnose','plan','spontaneous','stats','vacuums','tensions','decay 1'].map(c=>
              <button key={c} className="hover:text-[#48b89a]" onClick={()=>{exec(c);}}>{c}</button>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
  </script>
</head>
<body><div id="root"></div></body>
</html>
