// ═══════════════════════════════════════════════════════════════
// TEACHER — Closes the feedback loop (complete, from core/teacher.js)
// ═══════════════════════════════════════════════════════════════
class Teacher {
  constructor(engine){this.engine=engine;this.log=[];this.corrections=0;this.lessons=0;}
  diagnose(){
    const vacs=this.engine.vacuums(10),surps=this.engine.surpluses(10),brs=this.engine.bridges(10),st=this.engine.stats();
    const underexposed=[];for(const[w,n]of Object.entries(this.engine.nodes)){const d=this.engine.depth(w);if(n.freq>=3&&d.level==="shallow")underexposed.push({word:w,freq:n.freq,evidence:d.evidence});}underexposed.sort((a,b)=>b.freq-a.freq);
    const starved=[];for(const[w,n]of Object.entries(this.engine.nodes)){if(n.freq<2)continue;const p=this.engine.pressureOf(w);if(p&&p.pressure<0&&p.inbound>=3)starved.push({word:w,inbound:p.inbound,actual:p.actual,deficit:p.inbound-p.actual});}starved.sort((a,b)=>b.deficit-a.deficit);
    return{vocab:st.vocab,depths:st.depths,vacuums:vacs,surpluses:surps,bridges:brs,underexposed:underexposed.slice(0,10),starved:starved.slice(0,10),needs:this._prescribe(vacs,underexposed,starved,brs,st)};}
  _prescribe(vacs,underexposed,starved,bridges,st){
    const needs=[];if(st.vocab===0){needs.push("Empty engine. Feed any text to begin.");return needs;}
    if(st.depths.deep<3)needs.push("Very few deep words. Feed more repeated sentences.");
    if(underexposed.length>5)needs.push(underexposed.length+" words seen 3+ times but still shallow: "+underexposed.slice(0,5).map(w=>w.word).join(", "));
    if(starved.length>0)needs.push(starved.length+" words predicted but structurally thin: "+starved.slice(0,5).map(w=>w.word).join(", "));
    if(bridges.length>0)needs.push(bridges.length+" bridge words: "+bridges.slice(0,3).map(b=>b.word).join(", "));
    if(!needs.length)needs.push("Engine balanced. Feed new domain text or run drills.");return needs;}
  lesson(text,domain="general"){const before=this.engine.stats();const fed=this.engine.feedText(text);const decayed=before.vocab>50?this.engine.decay(1):{edgesRemoved:0};const after=this.engine.stats();const newWords=after.vocab-before.vocab;const newDepths={};for(const l of Object.keys(after.depths))newDepths[l]=after.depths[l]-before.depths[l];const textWords=text.toLowerCase().match(/[a-z0-9]+/g)||[];const newVacuums=[];for(const w of new Set(textWords)){const p=this.engine.pressureOf(w);if(p&&p.pressure<0)newVacuums.push(w);}this.lessons++;const result={lesson:this.lessons,domain,fed,newWords,newDepths,decayed:decayed.edgesRemoved,newVacuums};this.log.push(result);return result;}
  drill(sentence){const tokens=this.engine.feed(sentence);const forward=this.engine.scoreSentence(sentence);const words=sentence.toLowerCase().match(/[a-z0-9]+/g)||[];const reversed=[...words].reverse().join(" ");const backward=this.engine.scoreSentence(reversed);const asymmetry=forward.coherence-backward.coherence;return{sentence,reversed,forwardCoherence:forward.coherence,backwardCoherence:backward.coherence,asymmetry,learned:asymmetry>0.05};}
  correctAssociation(wordA,wordB,rightContext){const beforeAff=this.engine.affinity(wordA,wordB);const ul=this.engine.unlearn(wordA,wordB);let fed=null;if(rightContext)fed=this.engine.feedText(rightContext);const afterAff=this.engine.affinity(wordA,wordB);this.corrections++;return{correction:this.corrections,wordA,wordB,before:beforeAff.mutual,after:afterAff.mutual,weakened:afterAff.mutual<beforeAff.mutual,unlearned:ul,fed};}
  plan(){const diag=this.diagnose();const steps=[];

    if(diag.underexposed.length>0){const t=diag.underexposed.slice(0,5).map(u=>u.word);steps.push({priority:2,action:"reinforce",targets:t,instruction:"Reinforce shallow words: "+t.join(", ")});}

    for(let i=0;i<maxLen-1;i++){const nd=eng.nodes[current];if(!nd||!nd.next||!Object.keys(nd.next).length)break;const entries=Object.entries(nd.next);const total=entries.reduce((s,[,w])=>s+w,0);let r=Math.random()*total,picked=entries[0][0];for(const[word,weight]of entries){r-=weight;if(r<=0){picked=word;break;}}if(words.includes(picked)&&words.length>2)break;words.push(picked);current=picked;}

}

// IndexedDB persistence
// ═══════════════════════════════════════════════════════════════
const IDB={
  open(){return new Promise((res,rej)=>{const r=indexedDB.open("shifu-v2",1);r.onupgradeneeded=()=>r.result.createObjectStore("state");r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});},
  async get(key){const db=await this.open();return new Promise((res,rej)=>{const tx=db.transaction("state","readonly");const r=tx.objectStore("state").get(key);r.onsuccess=()=>res(r.result||null);r.onerror=()=>rej(r.error);});},
  async set(key,val){const db=await this.open();return new Promise((res,rej)=>{const tx=db.transaction("state","readwrite");tx.objectStore("state").put(val,key);tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);});},
  async del(key){const db=await this.open();return new Promise((res,rej)=>{const tx=db.transaction("state","readwrite");tx.objectStore("state").delete(key);tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);});}
};

  <script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const engine = new ShifuEmbryo();
const teacher = new Teacher(engine);

const DC = { unborn:"depth-unborn", surface:"depth-surface", shallow:"depth-shallow", forming:"depth-forming", structured:"depth-structured", deep:"depth-deep" };

// ─── Signal bar component ───────────────────────────────────
function Bar({label, value, max=1, color="bar-green"}) {
  const pct = Math.max(1, Math.min(100, (value/max)*100));
  return <div className="flex items-center gap-2 text-[10px]">
    <span className="w-20 text-right text-gray-500 truncate">{label}</span>
    <div className="flex-1 bar-bg h-2 rounded-full"><div className={`h-full rounded-full ${color}`} style={{width:pct+"%"}}></div></div>
    <span className="w-12 text-gray-500">{typeof value==='number'?value.toFixed(3):value}</span>
  </div>;
}

function DepthBadge({word}) {
  const d = engine.depth(word);
  return <span className={`px-2 py-0.5 rounded text-[10px] ${DC[d.level]||DC.unborn}`}>{d.level} ({d.evidence.toFixed(2)})</span>;
}

function App() {
  const [messages, setMessages] = useState([{id:'s0',sender:'system',text:"Shifu v2 ready. Type a word, paste text, or ask me anything."}]);
  const [input, setInput] = useState("");
  const [stats, setStats] = useState({vocab:0,tokens:0,sentences:0});
  const [autoTeach, setAutoTeach] = useState(false);
  const [autoCount, setAutoCount] = useState(0);
  const autoRef = useRef(null);
  const endRef = useRef(null);

  const [loading, setLoading] = useState('');
  // Load from IndexedDB, or fetch trained brain from server with progress
  useEffect(()=>{IDB.get('engine').then(async d=>{if(d){engine.deserialize(d);refresh();addMsg('system',"Restored: "+engine.stats().vocab+" words from IndexedDB.");}else{try{setLoading('Connecting...');const r=await fetch('/state');if(r.ok){const len=parseInt(r.headers.get('content-length'))||0;const totalMB=Math.round(len/1024/1024);const reader=r.body.getReader();const chunks=[];let received=0;
    while(true){const{done,value}=await reader.read();if(done)break;chunks.push(value);received+=value.length;if(len>0)setLoading(`Downloading brain... ${Math.round(received/1024/1024)}/${totalMB}MB`);}
    setLoading('Parsing...');await new Promise(r=>setTimeout(r,50));
    const jsonText=await new Blob(chunks).text();
    setLoading('Building graph...');await new Promise(r=>setTimeout(r,50));
    engine.deserialize(jsonText);
    setLoading('Saving to IndexedDB...');await new Promise(r=>setTimeout(r,50));
    await IDB.set('engine',jsonText);refresh();setLoading('');
    addMsg('system',"Loaded trained brain: "+engine.stats().vocab+" words ("+Math.round(jsonText.length/1024/1024)+"MB). Saved to IndexedDB for offline use.");
    }else{setLoading('');addMsg('system','No pre-trained brain on server. Starting empty.');}}catch(e){setLoading('');addMsg('system','Starting empty — feed text to begin.');}}});},[]);
  useEffect(()=>{endRef.current?.scrollIntoView({behavior:'smooth'});},[messages]);

  const refresh = () => { const s=engine.stats(); setStats({vocab:s.vocab,tokens:s.tokenCount,sentences:s.sentences}); };
  const save = async () => { await IDB.set('engine',engine.serialize()); refresh(); };

  const addMsg = (sender, text, content=null) => {
    setMessages(m=>[...m, {id:Date.now()+'-'+Math.random(), sender, text, content}]);
  };

  const autoStatsRef = useRef({rounds:0,generated:0,decayed:0,drills:0,vocabStart:0});
  // ─── Auto-teach loop (silent background) ───────────────
  useEffect(()=>{
    if(autoTeach){
      const st=autoStatsRef.current;st.rounds=0;st.generated=0;st.decayed=0;st.drills=0;st.vocabStart=Object.keys(engine.nodes).length;
      addMsg('system','Auto-teach started. Teaching silently in the background...');
      autoRef.current = setInterval(()=>{
        const r = teacher.spontaneous();
        if(r.action==="wait")return;
        st.rounds++;st.generated+=r.generated.length;st.decayed+=r.decayed;if(r.drill)st.drills++;
        setAutoCount(st.rounds);
        if(st.rounds%10===0)save(); else refresh();
      }, 2000);
    } else {
      if(autoRef.current){clearInterval(autoRef.current);
        const st=autoStatsRef.current;if(st.rounds>0){save();
          const vocabNow=Object.keys(engine.nodes).length;
          addMsg('system',`Auto-teach stopped.`,<div className="mt-1 text-[10px] text-gray-400">
            {st.rounds} rounds | {st.generated} sentences generated | {st.drills} drills | {st.decayed} edges decayed<br/>
            Vocab: {st.vocabStart} -> {vocabNow} (+{vocabNow-st.vocabStart})
          </div>);
        }
      }
    }
    return ()=>{if(autoRef.current)clearInterval(autoRef.current);};
  },[autoTeach]);

  // ─── Stop words — function words the graph knows but aren't content ───
  const STOP = new Set(['the','a','an','is','are','was','were','be','been','and','or','but','in','on','at','to','for','of','it','its','do','does','did','what','how','why','who','where','when','this','that','can','could','would','should','will','shall','may','might','about','into','with','from','by','up','out','if','then','than','so','no','not','my','your','his','her','me','you','we','they','them','us','has','have','had','get','got','just','all','some','any','each','every','much','many','more','most','very','too','also','like','such','between','through','i','am','as','these','those','been','being','here','there','own','other']);

  // ─── Render helpers (aperture-scaled) ────────────────────
  const showExplore = (w, ap) => {
    const node=engine.nodes[w];
    if(!node){addMsg('system',`"${w}" — unborn. I haven't seen this word yet.`);return;}
    const p=engine.pressureOf(w);
    // Fork: compact. Spoon: full context. Knife: structural.
    const nbrN = ap==='fork'?5:10, nxtN = ap==='fork'?3:8;
    const topNbr=Object.entries(node.neighbors).sort((a,b)=>b[1]-a[1]).slice(0,nbrN);
    const topNext=Object.entries(node.next).sort((a,b)=>b[1]-a[1]).slice(0,nxtN);
    const topPrev=ap!=='fork'?Object.entries(node.prev).sort((a,b)=>b[1]-a[1]).slice(0,5):[];
    const sim=ap!=='fork'?engine.similar(w,5):[];
    addMsg('system',w,<div className="mt-2 space-y-2 text-[10px]">
      <div className="flex items-center gap-2"><DepthBadge word={w}/><span className="text-gray-500">freq:{node.freq} | pressure:{p?.pressure}</span></div>
      <div className="bg-[#0d1117] p-2 rounded">
        <div className="text-[#48b89a] mb-1">Neighbors ({Object.keys(node.neighbors).length})</div>
        <div className="flex flex-wrap gap-1">{topNbr.map(([n,c])=><span key={n} className="px-1 bg-[#1a2130] rounded">{n}<span className="text-gray-600">:{c}</span></span>)}</div>
      </div>
      <div className="bg-[#0d1117] p-2 rounded">
        <div className="text-[#4a8db7] mb-1">Next words</div>
        <div className="flex flex-wrap gap-1">{topNext.map(([n,c])=><span key={n} className="px-1 bg-[#1a2130] rounded">{n}<span className="text-gray-600">:{c}</span></span>)}</div>
      </div>
      {topPrev.length>0&&<div className="bg-[#0d1117] p-2 rounded">
        <div className="text-[#d4a843] mb-1">Prev words</div>
        <div className="flex flex-wrap gap-1">{topPrev.map(([n,c])=><span key={n} className="px-1 bg-[#1a2130] rounded">{n}<span className="text-gray-600">:{c}</span></span>)}</div>
      </div>}
      {sim.length>0&&<div className="bg-[#0d1117] p-2 rounded">
        <div className="text-gray-400 mb-1">Similar</div>
        {sim.map(s=><div key={s.word} className="flex items-center gap-1"><DepthBadge word={s.word}/><span>{s.word}</span><span className="text-gray-600">{(s.similarity*100).toFixed(1)}%</span></div>)}
      </div>}
      {ap==='knife'&&<div className="bg-[#0d1117] p-2 rounded">
        <div className="text-[#e05252] mb-1">Structure</div>
        <div className="text-gray-400">closure: {p?.closure?.toFixed(2)} | depth: {engine.depth(w).level} ({engine.depth(w).evidence.toFixed(2)})</div>
        {(()=>{const t=engine.tensions?.(1);const tw=t?.find(x=>x.word===w);return tw?<div className="text-[#d4a843] mt-1">{tw.components} clusters: {tw.clusters.map(c=>'['+c.join(',')+']').join(' ')}</div>:null;})()}
      </div>}
    </div>);
  };

  const showCompare = (a,b,ap) => {
    const r=engine.compare(a,b);
    // Fork: just the number + key signals. Spoon: all + affinity. Knife: full bars.
    const aff = ap==='spoon' ? engine.affinity(a,b) : null;
    addMsg('system',`${a} ${ap==='knife'?'⚔':'↔'} ${b}`,<div className="mt-2 space-y-1 text-[10px]">
      <div className="flex gap-2 mb-2"><DepthBadge word={a}/><span className="text-gray-500">vs</span><DepthBadge word={b}/><span className="text-[#48b89a] ml-auto">{(r.similarity*100).toFixed(1)}% ({r.depth})</span></div>
      {r.signals.neighborOverlap!==undefined&&<Bar label="neighbors" value={r.signals.neighborOverlap} color="bar-green"/>}
      {r.signals.expectsAB!==undefined&&<Bar label={a+"→"+b} value={r.signals.expectsAB} color="bar-blue"/>}
      {r.signals.expectsBA!==undefined&&<Bar label={b+"→"+a} value={r.signals.expectsBA} color="bar-yellow"/>}
      {(ap!=='fork'&&r.signals.trajectoryAB!==undefined)&&<Bar label="traj A→B" value={r.signals.trajectoryAB} color="bar-blue"/>}
      {(ap!=='fork'&&r.signals.trajectoryBA!==undefined)&&<Bar label="traj B→A" value={r.signals.trajectoryBA} color="bar-yellow"/>}
      {(ap!=='fork'&&r.signals.indirectAB!==undefined)&&<Bar label="indirect" value={r.signals.indirectAB} color="bar-green"/>}
      {(ap!=='fork'&&r.signals.posSim!==undefined)&&<Bar label="position" value={r.signals.posSim} color="bar-green"/>}
      {ap!=='fork'&&<Bar label="edit" value={r.signals.editSim} color="bar-green"/>}
      {ap!=='fork'&&<Bar label="ocr" value={r.signals.ocrSim} color="bar-green"/>}
      {aff&&aff.known&&<div className="mt-2 pt-2 border-t border-[#1a2130]">
        <div className="text-gray-400 mb-1">Affinity: mutual {(aff.mutual*100).toFixed(1)}%</div>
        <Bar label="orbit" value={aff.orbit} color="bar-green"/>
        <Bar label={"pull "+a+"→"} value={aff.pullAB} color="bar-blue"/>
        <Bar label={"pull "+b+"→"} value={aff.pullBA} color="bar-yellow"/>
      </div>}
    </div>);
  };

  const showPressure = (type) => {
    let items;
    if(type==='pressure') items=engine.pressure().slice(0,15);
    else if(type==='vacuums') items=engine.vacuums(10);
    else if(type==='surpluses') items=engine.surpluses(10);
    else if(type==='bridges') items=engine.bridges(10);
    else items=engine.tensions(10);
    if(type==='tensions'){
      addMsg('system',`${items.length} split words:`,<div className="mt-1 text-[10px] space-y-1">
        {items.map(t=><div key={t.word} className="bg-[#0d1117] p-2 rounded">
          <span className="text-[#e05252]">{t.word}</span> <span className="text-gray-500">({t.components} clusters, tension:{t.tension.toFixed(2)})</span>
          <div className="flex gap-2 mt-1">{t.clusters.map((c,i)=><span key={i} className="text-gray-400">[{c.join(', ')}]</span>)}</div>
        </div>)}
        {!items.length&&<span className="text-gray-500">No tensions detected.</span>}
      </div>);
    } else {
      const maxP=Math.max(...items.map(p=>Math.abs(p.pressure||0)),1);
      addMsg('system',type.charAt(0).toUpperCase()+type.slice(1)+':',<div className="mt-1 text-[10px] space-y-1">
        {items.map(p=><div key={p.word} className="flex items-center gap-1">
          <DepthBadge word={p.word}/>
          <span className="w-20 truncate">{p.word}</span>
          <div className="flex-1 bar-bg h-2 rounded-full"><div className={`h-full rounded-full ${p.pressure<0?'bar-red':'bar-green'}`} style={{width:Math.max(2,Math.abs(p.pressure)/maxP*100)+"%"}}></div></div>
          <span className="w-10 text-gray-500">{p.pressure}</span>
          <span className="w-14 text-gray-600">cl:{p.closure?.toFixed(2)}</span>
        </div>)}
        {!items.length&&<span className="text-gray-500">None found.</span>}
      </div>);
    }
  };

  // ─── The perturbation handler ────────────────────────────
  // Score the input. The score tells you the utensil.
  // High coherence = fork (user speaks the domain, give the fact)
  // Low coherence = spoon (user is exploring, give context)
  // Structural words = knife (user wants dissection)
  const exec = useCallback((txt)=>{
    if(!txt.trim())return;
    setMessages(m=>[...m,{id:Date.now(),sender:'user',text:txt}]);
    const raw=txt.trim(), low=raw.toLowerCase();
    const tokens=tokenize(raw);
    const content=tokens.filter(w=>!STOP.has(w));

    // ── Operational commands (meta, not content) ──
    if(/^(help|what can you do)\??$/i.test(low)){
      addMsg('system',
`Type a word — I'll show you what I know.
Two words — I'll compare them.
Paste text — I'll learn from it.
Use _ for a blank — I'll fill it.

The more I know your words, the more I show.

forget [word] · disconnect [a] from [b] · decay · collapse [word]
stats · plan · diagnose · history · reset`);
      setInput("");return;}
    if(/^(reset|start over|clear)$/i.test(low)){IDB.del('engine').then(()=>location.reload());return;}
    if(/^(stats|status|vocab)\??$/i.test(low)){
      const s=engine.stats();
      addMsg('system',`${s.vocab} words | ${s.tokens} tokens | ${s.sentences} sentences`,<div className="mt-2 grid grid-cols-6 gap-1 text-[10px]">
        {Object.entries(s.depths).map(([k,v])=><div key={k} className={`text-center py-1 rounded ${DC[k]}`}>{k}<br/>{v}</div>)}
      </div>);setInput("");return;}
    if(/^(diagnose|needs|health|what do you need)\??$/i.test(low)){
      const d=teacher.diagnose();
      addMsg('system','Diagnosis:',<div className="mt-2 text-[10px] space-y-2">
        <div className="bg-[#0d1117] p-2 rounded"><span className="text-[#48b89a] block mb-1">Needs</span>{d.needs.map((n,i)=><div key={i} className="text-gray-400">- {n}</div>)}</div>
        {d.starved.length>0&&<div className="bg-[#0d1117] p-2 rounded"><span className="text-red-400 block mb-1">Starved</span><div className="flex flex-wrap gap-1">{d.starved.map(s=><span key={s.word} className="px-1 bg-[#1a2130] rounded">{s.word}<span className="text-gray-600"> deficit:{s.deficit}</span></span>)}</div></div>}
        {d.underexposed.length>0&&<div className="bg-[#0d1117] p-2 rounded"><span className="text-blue-400 block mb-1">Underexposed</span><div className="flex flex-wrap gap-1">{d.underexposed.map(s=><span key={s.word} className="px-1 bg-[#1a2130] rounded">{s.word}<span className="text-gray-600"> f:{s.freq}</span></span>)}</div></div>}
      </div>);setInput("");return;}
    if(/^(plan|what.?s next)\??$/i.test(low)){
      const p=teacher.plan();
      addMsg('system','Teaching Plan:',<div className="mt-2 space-y-1 text-[10px]">
        {p.steps.map((s,i)=><div key={i} className="bg-[#0d1117] p-2 border-l-2 border-[#48b89a] rounded-r">
          <span className="text-[#48b89a]">P{s.priority}</span> <span className="text-gray-300">{s.action}</span>
          <div className="text-gray-500 mt-0.5">{s.instruction}</div>
        </div>)}
        {!p.steps.length&&<span className="text-gray-500">Engine balanced.</span>}
      </div>);setInput("");return;}
    if(/^(history|log)\??$/i.test(low)){
      const h=teacher.history();
      addMsg('system',`${h.lessons} lessons | ${h.corrections} corrections`,<div className="mt-1 text-[10px] text-gray-500 max-h-40 overflow-y-auto whitespace-pre-wrap">{JSON.stringify(h.log.slice(-5),null,1)}</div>);
      setInput("");return;}
    if(/^(spontaneous|self.?teach|think)$/i.test(low)){
      const r=teacher.spontaneous();save();
      addMsg('system',`Self-taught #${r.lesson}`,<div className="mt-1 text-[10px] space-y-1">
        {r.generated.map((g,i)=><div key={i} className="text-gray-400"><span className="text-[#48b89a]">{g.type}</span> [{g.word||g.from}]: {g.sentence}</div>)}
        {r.drill&&<div className="text-gray-400">Drill asym: {r.drill.asymmetry.toFixed(3)}</div>}
        <div className="text-gray-500">Decayed: {r.decayed} | Vocab: {r.vocab}</div>
      </div>);setInput("");return;}
    if(/^pressure$/i.test(low)){showPressure('pressure');setInput("");return;}
    if(/^(vacuums?|gaps?|what.?s missing)\??$/i.test(low)){showPressure('vacuums');setInput("");return;}
    if(/^(surpluses?|hubs?|what.?s strong)\??$/i.test(low)){showPressure('surpluses');setInput("");return;}
    if(/^(bridges?)\??$/i.test(low)){showPressure('bridges');setInput("");return;}
    if(/^(tensions?|splits?)\??$/i.test(low)){showPressure('tensions');setInput("");return;}
    if(/^(decay|prune)\s*(\d*)$/i.test(low)){
      const m=low.match(/(\d+)/);const thresh=m?parseInt(m[1]):1;
      const r=engine.decay(thresh);save();
      addMsg('system',`Pruned ${r.edgesRemoved} edges (threshold ≤ ${thresh}).`);
      setInput("");return;}
    if(/^(forget|remove|delete)\s+(\w+)$/i.test(low)){
      const w=low.match(/\s+(\w+)$/)[1];engine.forget(w);save();
      addMsg('system',`Forgot "${w}". All references removed.`);setInput("");return;}
    if(/^(unlearn|disconnect|separate)\s+(\w+)\s+(and|from)\s+(\w+)$/i.test(low)){
      const m=low.match(/(\w+)\s+(?:and|from)\s+(\w+)$/);
      const r=engine.unlearn(m[1],m[2]);save();
      addMsg('system',`Weakened ${r.edgesWeakened} edges between ${m[1]} and ${m[2]}.`);
      setInput("");return;}
    if(/^collapse\s+(\w+)$/i.test(low)){
      const w=low.match(/collapse\s+(\w+)/)[1];const r=engine.collapse(w);save();
      if(!r.ok)addMsg('system',`Collapse "${w}": ${r.reason}`);
      else addMsg('system',`Collapsed "${w}": kept ${r.kept}, pruned ${r.pruned}`,<div className="mt-1 text-[10px] text-gray-400">
        Surviving: {r.surviving.join(', ')}<br/>Removed: {r.removed.map(c=>c.join(',')).join(' | ')}
      </div>);setInput("");return;}

    // ══════════════════════════════════════════════════════════
    // PERTURBATION: score the input against the graph
    // ══════════════════════════════════════════════════════════
    const score = tokens.length>=2 ? engine.scoreSentence(raw) : null;
    const co = score ? score.coherence : 0;
    const depths = tokens.map(w=>({word:w,...engine.depth(w)}));
    const known = depths.filter(d=>d.level!=='unborn');
    const deep = depths.filter(d=>d.level==='structured'||d.level==='deep');
    const hasBlank = raw.includes('_');
    const structural = /\b(break\s*down|compare|between|versus|vs|analyze|decompose|types|difference|similarities|list|steps|classify)\b/i.test(raw);

    // Aperture: the coherence score IS the measurement
    let ap = 'spoon'; // low coherence → exploring → give context
    if(co>0.4 || (content.length<=2 && deep.length>0)) ap='fork'; // fluent → give the fact
    if(structural && content.length>=2) ap='knife'; // structural words → dissect

    // ── Blank → fill it (fork: they know the domain, want precision) ──
    if(hasBlank){
      const r=engine.query(raw);
      if(!r.ok){addMsg('system',r.reason);}
      else {
        const n = ap==='fork'?3:5;
        addMsg('system',r.filled,<div className="mt-2 text-[10px] space-y-1">
          <div className="text-gray-500">coherence: {r.coherence.toFixed(3)}</div>
          {r.candidates.slice(0,n).map((c,i)=><div key={c.word} className="flex items-center gap-2">
            <span className={`w-4 text-right ${i===0?'text-[#48b89a]':'text-gray-600'}`}>{i+1}</span>
            <span className="w-24">{c.word}</span>
            <div className="flex-1 bar-bg h-2 rounded-full"><div className="bar-green h-full rounded-full" style={{width:Math.min(100,c.total*200)+"%"}}></div></div>
            {ap!=='fork'&&<span className="text-gray-600 w-20">{Object.entries(c.signals).map(([k,v])=>k+':'+v.toFixed(2)).join(' ')}</span>}
          </div>)}
        </div>);
      }
      setInput("");return;
    }

    // ── Single token → explore it ──
    if(tokens.length===1){
      showExplore(tokens[0],ap);
      setInput("");return;
    }

    // ── Two content words → compare them ──
    if(content.length===2 && tokens.length<=6){
      showCompare(content[0],content[1],ap);
      setInput("");return;
    }

    // ── 3+ tokens: the coherence tells us what they want ──

    // High coherence → this fits the graph. They speak the domain.
    // Feed as lesson (directed teaching with decay + scoring).
    if(tokens.length>=5 && co>0.3){
      const r=teacher.lesson(raw);save();
      addMsg('system',`Lesson #${r.lesson}`,<div className="mt-1 text-[10px] text-gray-400">
        +{r.newWords} words | {r.fed.sentences} sentences | decayed: {r.decayed}
        {r.newVacuums.length>0&&<span className="text-red-400"> | new vacuums: {r.newVacuums.join(', ')}</span>}
      </div>);
      setInput("");return;
    }

    // Low coherence, mostly unknown → new territory. Feed it.
    if(tokens.length>=3 && known.length<tokens.length*0.5){
      const r=engine.feedText(raw);save();
      addMsg('system',`Learned ${r.sentences} sentences, ${r.tokens} tokens. Vocab: ${Object.keys(engine.nodes).length}`);
      setInput("");return;
    }

    // Medium coherence, has known words → score it and show the walk
    // The user is between domains or testing coherence
    if(tokens.length>=3 && score){
      // Show the score walk — this IS the response
      addMsg('system',null,<div className="mt-1 bg-[#0d1117] p-3 rounded text-[10px]">
        <div className="flex justify-between mb-2 text-[#48b89a]">
          <span>coherence: {score.coherence.toFixed(3)}</span>
          <span className="text-gray-500">{ap==='fork'?'fork':'spoon'}</span>
        </div>
        <div className="space-y-1">{score.steps.map((st,i)=><div key={i} className="flex items-center gap-1">
          <span className="w-24 truncate text-gray-400">{st.word}{st.afGate>0.1?<span className="text-yellow-500 ml-0.5">*</span>:''}</span>
          <div className="flex-1 bar-bg h-2.5 rounded-full"><div className={`h-full rounded-full ${st.surprise<0.3?'bar-green':st.surprise<0.7?'bar-yellow':'bar-red'}`} style={{width:Math.max(2,st.surprise*100)+"%"}}></div></div>
          <span className="w-10 text-gray-600">{st.surprise.toFixed(2)}</span>
        </div>)}</div>
      </div>);
      // Also feed it — every input is a perturbation
      engine.feed(raw);save();
      setInput("");return;
    }

    // Fallback: feed whatever it is
    if(tokens.length>=2){
      const r=engine.feedText(raw);save();
      addMsg('system',`Learned ${r.sentences} sentences, ${r.tokens} tokens.`);
      setInput("");return;
    }

    addMsg('system',`"${raw}" — not enough signal.`);
    setInput("");
  },[]);

  return (
    <div className="h-screen w-full flex flex-col items-center justify-center p-2">
      <div className="w-full max-w-3xl h-[95vh] glass-panel rounded-xl shadow-2xl flex flex-col overflow-hidden">
        {/* HEADER */}
        <div className="h-12 border-b border-[#1a2130] flex items-center justify-between px-4 bg-[#0a0e14] shrink-0">
          <div className="flex items-center gap-3">
            <div className={`w-2.5 h-2.5 rounded-full ${autoTeach?'bg-[#48b89a] pulse':'bg-gray-600'}`}></div>
            <h1 className="font-serif-header text-lg tracking-wide">Shifu v2</h1>
            <span className="text-[10px] text-gray-600">embryo engine</span>
          </div>
          <div className="flex items-center gap-4 text-[10px]">
            <button onClick={()=>setAutoTeach(!autoTeach)} className={`px-2 py-1 rounded border ${autoTeach?'border-[#48b89a] text-[#48b89a]':'border-[#1a2130] text-gray-600 hover:text-gray-400'}`}>
              {autoTeach?'AUTO ON ('+autoCount+')':'AUTO OFF'}
            </button>
            <span className="text-gray-500 font-mono">{stats.vocab}w {stats.tokens}t {stats.sentences}s</span>
          </div>
        </div>

        {/* LOADING BAR */}
        {loading && <div className="px-4 py-2 bg-[#0d1117] border-b border-[#1a2130] text-[10px] text-[#48b89a] flex items-center gap-2 shrink-0">
          <div className="w-2 h-2 rounded-full bg-[#48b89a] pulse"></div>{loading}
        </div>}

        {/* MESSAGES */}
        <div className="flex-1 overflow-y-auto p-3 space-y-2">
          {messages.map(msg=>(
            <div key={msg.id} className={`flex ${msg.sender==='user'?'justify-end':'justify-start'}`}>
              <div className={`max-w-[90%] rounded-lg p-2.5 ${
                msg.sender==='user'?'bg-[#1a2840] text-white':
                msg.sender==='auto'?'bg-[#0d1117] border border-[#1a3020]':
                'bg-[#0a0e14] border border-[#1a2130]'}`}>
                {msg.sender==='auto'&&<span className="text-[9px] text-[#48b89a] block mb-0.5">AUTO-TEACH</span>}
                <div className="text-xs whitespace-pre-wrap">{msg.text}</div>
                {msg.content}
              </div>
            </div>
          ))}
          <div ref={endRef}/>
        </div>

        {/* INPUT */}
        <div className="p-3 bg-[#0a0e14] border-t border-[#1a2130] shrink-0">
          <div className="flex gap-2">
            <input type="text" value={input} onChange={e=>setInput(e.target.value)}
              onKeyDown={e=>{if(e.key==='Enter'){exec(input);setInput('');}}}
              placeholder="type a word, paste text, ask anything..."
              className="flex-1 bg-[#0e1219] border border-[#1a2130] rounded-lg py-2.5 px-3 text-sm text-[#a8b4c4] focus:outline-none focus:border-[#48b89a]"/>
            <label className="flex items-center gap-1 px-3 py-2 bg-[#0e1219] border border-[#1a2130] rounded-lg cursor-pointer hover:border-[#48b89a] text-[10px] text-gray-500 hover:text-[#48b89a] shrink-0">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
              Upload
              <input type="file" multiple accept=".txt,.text,.md,.csv,.json,.html,.xml,.log,.srt,.sub,.rtf,.pdf,.doc" className="hidden" onChange={async e=>{
                const files=[...e.target.files];if(!files.length)return;
                addMsg('user',`Uploading ${files.length} file${files.length>1?'s':''}...`);
                let totalSent=0,totalTok=0,totalFiles=0;
                for(const f of files){
                  try{
                    let text='';
                    if(f.name.toLowerCase().endsWith('.pdf')){
                      addMsg('system',`Extracting text from ${f.name}...`);
                      const pdfjsLib=await import('https://cdn.jsdelivr.net/npm/pdfjs-dist@4.0.379/build/pdf.min.mjs');
                      pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdn.jsdelivr.net/npm/pdfjs-dist@4.0.379/build/pdf.worker.min.mjs';
                      const buf=await f.arrayBuffer();
                      const pdf=await pdfjsLib.getDocument({data:buf}).promise;
                      const pages=[];
                      for(let i=1;i<=pdf.numPages;i++){const pg=await pdf.getPage(i);const c=await pg.getTextContent();pages.push(c.items.map(it=>it.str).join(' '));}
                      text=pages.join('\n');
                    }else{text=await f.text();}
                    if(!text.trim()){addMsg('system',`${f.name}: empty or unreadable, skipped.`);continue;}
                    const r=engine.feedText(text);
                    totalSent+=r.sentences;totalTok+=r.tokens;totalFiles++;
                    addMsg('system',`${f.name}: ${r.sentences} sentences, ${r.tokens} tokens`);
                  }catch(err){addMsg('system',`${f.name}: error — ${err.message}`);}
                }
                if(totalFiles>0){save();addMsg('system',`Done. Fed ${totalFiles} file${totalFiles>1?'s':''}: ${totalSent} sentences, ${totalTok} tokens. Vocab: ${Object.keys(engine.nodes).length}`);}
                e.target.value='';
              }}/>
            </label>
          </div>
          <div className="flex gap-2 mt-2 text-[10px] text-gray-600 justify-center flex-wrap">
            {['diagnose','plan','spontaneous','stats','vacuums','tensions','decay 1'].map(c=>
              <button key={c} className="hover:text-[#48b89a]" onClick={()=>{exec(c);}}>{c}</button>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
  </script>
</head>
