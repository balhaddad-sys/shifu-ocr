<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shifu — Neural Topology</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600&family=Instrument+Serif&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'IBM Plex Mono',monospace;color:#a8b4c4;-webkit-tap-highlight-color:transparent}
canvas{display:block;touch-action:none}

#header{position:fixed;top:0;left:0;right:0;padding:14px 20px;z-index:10;pointer-events:none;background:linear-gradient(to bottom,rgba(0,0,0,0.9) 0%,rgba(0,0,0,0.3) 70%,transparent 100%)}
#header>*{pointer-events:auto}
.title{font-family:'Instrument Serif',serif;font-size:1.8em;color:#48b89a;letter-spacing:2px;text-shadow:0 0 30px rgba(72,184,154,0.3)}
.subtitle{color:#2a3a4a;font-size:0.65em;font-weight:300;margin-top:1px;letter-spacing:1px}
.stats-row{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap}
.chip{background:rgba(14,18,25,0.7);border:1px solid rgba(26,33,48,0.6);padding:3px 8px;border-radius:12px;font-size:0.6em;backdrop-filter:blur(8px)}
.chip b{color:#48b89a}

/* Unified input bar — responsive */
#input-bar{position:fixed;bottom:16px;left:12px;right:12px;z-index:10;display:flex;align-items:center;background:rgba(6,10,16,0.9);border:1px solid rgba(26,33,48,0.5);border-radius:28px;padding:4px 8px 4px 14px;backdrop-filter:blur(12px);transition:all 0.3s}
#input-bar:focus-within{border-color:#48b89a;box-shadow:0 0 30px rgba(72,184,154,0.12)}
#input-mode{color:#3a4a5a;font-size:0.55em;text-transform:uppercase;letter-spacing:2px;min-width:36px;transition:color 0.3s}
#input-bar:focus-within #input-mode{color:#48b89a}
#main-input{flex:1;background:none;border:none;color:#a8b4c4;padding:12px 6px;font-family:inherit;font-size:0.85em;outline:none;min-width:0}
#main-input::placeholder{color:#2a3a4a}
#input-hint{color:#2a3a4a;font-size:0.55em;padding-right:10px;white-space:nowrap;transition:opacity 0.3s}

/* Word label floating above current node */
#word-label{position:fixed;z-index:15;pointer-events:none;text-align:center;transition:opacity 0.4s,transform 0.4s;opacity:0;transform:translateY(10px)}
#word-label.show{opacity:1;transform:translateY(0)}
#word-label .wl-word{font-family:'Instrument Serif',serif;font-size:1.6em;color:#fff;text-shadow:0 0 20px rgba(72,184,154,0.5),0 2px 8px rgba(0,0,0,0.8)}
#word-label .wl-info{font-size:0.65em;color:#5a6a7a;margin-top:2px}

/* Side panel — responsive */
#panel{position:fixed;right:0;top:0;bottom:0;width:280px;background:rgba(6,10,16,0.94);border-left:1px solid rgba(26,33,48,0.5);padding:70px 16px 16px;overflow-y:auto;transform:translateX(100%);transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);z-index:9;backdrop-filter:blur(12px)}
#panel.open{transform:translateX(0)}
.panel-word{font-family:'Instrument Serif',serif;font-size:1.5em;color:#48b89a;text-shadow:0 0 20px rgba(72,184,154,0.2)}
.panel-depth{display:inline-block;padding:3px 10px;border-radius:4px;font-size:0.68em;font-weight:600;margin:4px 0 10px}
.panel-metric{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(14,18,25,0.8);font-size:0.78em}
.panel-metric .v{color:#48b89a;font-weight:600}
.panel-section{margin-top:14px;margin-bottom:6px;color:#2a3a4a;font-size:0.6em;text-transform:uppercase;letter-spacing:2px}
.panel-tag{display:inline-block;background:rgba(14,18,25,0.6);border:1px solid rgba(26,33,48,0.4);padding:3px 8px;border-radius:4px;margin:2px;font-size:0.72em;cursor:pointer;transition:all 0.2s}
.panel-tag:hover{border-color:#48b89a;color:#48b89a}
.panel-close{position:absolute;top:16px;right:12px;background:none;border:none;color:#3a4a5a;font-size:1.5em;cursor:pointer;padding:8px}

/* Depth chart — hide on small screens */
#depth-chart{position:fixed;bottom:70px;left:12px;background:rgba(6,10,16,0.8);border:1px solid rgba(26,33,48,0.4);border-radius:8px;padding:10px 14px;z-index:10;backdrop-filter:blur(8px)}
.dc-title{color:#2a3a4a;font-size:0.6em;text-transform:uppercase;letter-spacing:2px;margin-bottom:6px}
.dc-row{display:flex;align-items:center;gap:6px;margin:3px 0;font-size:0.6em}
.dc-label{width:55px;text-align:right;color:#3a4a5a}
.dc-track{width:80px;height:4px;background:rgba(14,18,25,0.6);border-radius:3px;overflow:hidden}
.dc-fill{height:100%;border-radius:3px;transition:width 0.6s ease}
.dc-count{width:40px;color:#2a3a4a}

#feed-status{color:#48b89a;font-size:0.72em;position:fixed;bottom:62px;left:50%;transform:translateX(-50%);z-index:10;transition:opacity 0.6s;text-shadow:0 0 10px rgba(72,184,154,0.3);white-space:nowrap}

/* Mobile responsive */
@media(max-width:768px){
  .title{font-size:1.4em}
  .subtitle{font-size:0.55em}
  .chip{font-size:0.5em;padding:2px 6px}
  #panel{width:100%;padding-top:60px}
  #depth-chart{display:none}
  #main-input{font-size:16px} /* prevents iOS zoom */
  #word-label .wl-word{font-size:1.2em}
}
</style>
</head>
<body>

<div id="header">
  <div>
    <div class="title">SHIFU</div>
    <div class="subtitle">neural topology &mdash; 148,635 learned words</div>
    <div class="stats-row" id="stats"></div>
  </div>
</div>
<div id="word-label"><div class="wl-word"></div><div class="wl-info"></div></div>

<div id="panel">
  <button class="panel-close" onclick="document.getElementById('panel').classList.remove('open')">&times;</button>
  <div id="panel-content"></div>
</div>

<div id="depth-chart"></div>

<div id="input-bar">
  <div id="input-mode">search</div>
  <input type="text" id="main-input" placeholder="search words or type a sentence and press Enter to feed..." autocomplete="off" spellcheck="false">
  <div id="input-hint"></div>
</div>
<div id="feed-status"></div>

<script type="importmap">{"imports":{
  "three":"https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
  "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
}}</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

const DC = {
  surface: new THREE.Color(0x4b5563), shallow: new THREE.Color(0x4a8ab7),
  forming: new THREE.Color(0xd4a843), structured: new THREE.Color(0x48b89a),
  deep: new THREE.Color(0x2eff8a), unborn: new THREE.Color(0x3a3a3a)
};
const DCA = { surface:[75,85,99], shallow:[74,138,183], forming:[212,168,67], structured:[72,184,154], deep:[46,255,138] };

let DATA, nodes = [], nodeMap = {}, links = [];
let scene, camera, renderer, composer, controls;
let nodeMesh, glowSprites = [], edgeLines, particleSystem;
let raycaster = new THREE.Raycaster(), mouse = new THREE.Vector2();
let hovered = -1, selected = -1, searched = null;
let clock = new THREE.Clock();

// Load data
const resp = await fetch('/brain_data.json');
DATA = await resp.json();

// Stats UI
const s = DATA.stats;
document.getElementById('stats').innerHTML =
  `<span class="chip">vocab <b>${(s.vocab/1000).toFixed(0)}K</b></span>` +
  `<span class="chip">tokens <b>${(s.tokens/1e6).toFixed(1)}M</b></span>` +
  `<span class="chip">deep <b>${s.depths.deep.toLocaleString()}</b></span>` +
  `<span class="chip">sentences <b>${(s.sentences/1e6).toFixed(1)}M</b></span>`;

const maxD = Math.max(...Object.values(s.depths));
document.getElementById('depth-chart').innerHTML = '<div class="dc-title">Depth Distribution</div>' +
  Object.entries(s.depths).filter(([,v])=>v>0).map(([k,v])=>{
    const c = DCA[k] || [58,58,58];
    return `<div class="dc-row"><span class="dc-label">${k}</span><div class="dc-track"><div class="dc-fill" style="width:${v/maxD*100}%;background:rgb(${c})"></div></div><span class="dc-count">${v.toLocaleString()}</span></div>`;
  }).join('');

// Setup Three.js
scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000000, 0.0008);
camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 1, 5000);
camera.position.set(0, 0, 500);
renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Bloom post-processing
composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.6, 0.4, 0.85);
composer.addPass(bloom);

// Controls
controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.rotateSpeed = 0.5;
controls.minDistance = 100;
controls.maxDistance = 1500;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.3;

// Layout nodes on sphere layers by depth
const depthR = { surface: 100, shallow: 140, forming: 180, structured: 230, deep: 280 };
const N = DATA.nodes.length;
const positions = [];
const colors = [];
const sizes = [];
const nodeData = [];

DATA.nodes.forEach((n, i) => {
  const phi = Math.acos(1 - 2 * (i + 0.5) / N);
  const theta = Math.PI * (1 + Math.sqrt(5)) * i;
  const baseR = depthR[n.depth] || 150;
  const r = baseR + (Math.sin(i * 7.3) * 20);
  const x = r * Math.sin(phi) * Math.cos(theta);
  const y = r * Math.sin(phi) * Math.sin(theta);
  const z = r * Math.cos(phi);
  positions.push(x, y, z);
  const c = DC[n.depth] || DC.surface;
  colors.push(c.r, c.g, c.b);
  sizes.push(Math.max(1.5, Math.min(6, Math.pow(n.freq, 0.28) * 0.8)));
  nodeData.push({ ...n, x, y, z, idx: i });
  nodeMap[n.id] = i;
});
nodes = nodeData;

// Instanced spheres for nodes
const sphereGeo = new THREE.SphereGeometry(1, 12, 8);
const sphereMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
nodeMesh = new THREE.InstancedMesh(sphereGeo, sphereMat, N);
const dummy = new THREE.Object3D();
const colorAttr = new THREE.InstancedBufferAttribute(new Float32Array(N * 3), 3);

for (let i = 0; i < N; i++) {
  dummy.position.set(positions[i*3], positions[i*3+1], positions[i*3+2]);
  const s = sizes[i];
  dummy.scale.set(s, s, s);
  dummy.updateMatrix();
  nodeMesh.setMatrixAt(i, dummy.matrix);
  nodeMesh.setColorAt(i, new THREE.Color(colors[i*3], colors[i*3+1], colors[i*3+2]));
}
nodeMesh.instanceMatrix.needsUpdate = true;
nodeMesh.instanceColor.needsUpdate = true;
scene.add(nodeMesh);

// Glow sprites for each node
const glowTex = (() => {
  const c = document.createElement('canvas'); c.width = 64; c.height = 64;
  const g = c.getContext('2d');
  const grad = g.createRadialGradient(32, 32, 0, 32, 32, 32);
  grad.addColorStop(0, 'rgba(255,255,255,0.3)');
  grad.addColorStop(0.4, 'rgba(255,255,255,0.05)');
  grad.addColorStop(1, 'rgba(255,255,255,0)');
  g.fillStyle = grad; g.fillRect(0, 0, 64, 64);
  return new THREE.CanvasTexture(c);
})();

// Edges as lines
const edgePositions = [];
const edgeColors = [];
DATA.links.forEach(l => {
  const si = nodeMap[l.source], ti = nodeMap[l.target];
  if (si === undefined || ti === undefined) return;
  links.push({ si, ti, w: l.w });
  edgePositions.push(positions[si*3], positions[si*3+1], positions[si*3+2]);
  edgePositions.push(positions[ti*3], positions[ti*3+1], positions[ti*3+2]);
  edgeColors.push(0.1, 0.15, 0.2, 0.1, 0.15, 0.2);
});

const edgeGeo = new THREE.BufferGeometry();
edgeGeo.setAttribute('position', new THREE.Float32BufferAttribute(edgePositions, 3));
edgeGeo.setAttribute('color', new THREE.Float32BufferAttribute(edgeColors, 3));
edgeLines = new THREE.LineSegments(edgeGeo, new THREE.LineBasicMaterial({
  vertexColors: true, transparent: true, opacity: 0.08, blending: THREE.AdditiveBlending
}));
scene.add(edgeLines);

// Particles flowing along edges
const PARTICLES_PER_EDGE = 2;
const totalParticles = Math.min(links.length, 2000) * PARTICLES_PER_EDGE;
const particlePositions = new Float32Array(totalParticles * 3);
const particleColors = new Float32Array(totalParticles * 3);
const particleMeta = []; // { si, ti, offset }

for (let i = 0; i < Math.min(links.length, 2000); i++) {
  const l = links[i];
  for (let p = 0; p < PARTICLES_PER_EDGE; p++) {
    const idx = (i * PARTICLES_PER_EDGE + p);
    particleMeta.push({ si: l.si, ti: l.ti, offset: Math.random() });
    const c = DC[nodes[l.si].depth] || DC.surface;
    particleColors[idx*3] = c.r;
    particleColors[idx*3+1] = c.g;
    particleColors[idx*3+2] = c.b;
  }
}

const particleGeo = new THREE.BufferGeometry();
particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
particleGeo.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));
particleSystem = new THREE.Points(particleGeo, new THREE.PointsMaterial({
  size: 1.5, vertexColors: true, transparent: true, opacity: 0.4,
  blending: THREE.AdditiveBlending, depthWrite: false
}));
scene.add(particleSystem);

// Ambient particles (floating dust)
const dustCount = 800;
const dustGeo = new THREE.BufferGeometry();
const dustPos = new Float32Array(dustCount * 3);
for (let i = 0; i < dustCount; i++) {
  dustPos[i*3] = (Math.random() - 0.5) * 800;
  dustPos[i*3+1] = (Math.random() - 0.5) * 800;
  dustPos[i*3+2] = (Math.random() - 0.5) * 800;
}
dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
const dust = new THREE.Points(dustGeo, new THREE.PointsMaterial({
  size: 0.6, color: 0x1a2130, transparent: true, opacity: 0.3, blending: THREE.AdditiveBlending
}));
scene.add(dust);

// Interaction
function onMouseMove(e) {
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
}

function onClick() {
  if (hovered >= 0) {
    selected = hovered;
    showPanel(nodes[selected]);
    controls.autoRotate = false;
  } else {
    selected = -1;
    document.getElementById('panel').classList.remove('open');
  }
}

window.addEventListener('mousemove', onMouseMove);
window.addEventListener('click', onClick);
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});

// Unified input: searches as you type, feeds on Enter
const mainInput = document.getElementById('main-input');
const modeLabel = document.getElementById('input-mode');
const hintLabel = document.getElementById('input-hint');

mainInput.addEventListener('input', e => {
  const v = e.target.value.toLowerCase().trim();
  searched = v.length >= 2 ? v : null;

  if (searched) {
    // Find matches
    const exact = nodes.find(n => n.id === searched);
    const partial = !exact ? nodes.find(n => n.id.startsWith(searched)) : null;
    const match = exact || partial;

    if (match) {
      selected = match.idx;
      showPanel(match);
      flyToNode(match, 1.8);
      // Show floating label
      const wl = document.getElementById('word-label');
      wl.querySelector('.wl-word').textContent = match.id;
      wl.querySelector('.wl-info').textContent = `${match.depth} · freq ${match.freq} · ${match.nb} neighbors`;
      wl.classList.add('show');
      setTimeout(() => wl.classList.remove('show'), 4000);
      modeLabel.textContent = 'found';
      modeLabel.style.color = '#48b89a';
      hintLabel.textContent = 'Enter to feed';
    } else {
      const words = (v.match(/[a-z0-9]+/g) || []).filter(w => w.length > 1);
      const known = words.filter(w => nodeMap[w] !== undefined).length;
      modeLabel.textContent = 'search';
      modeLabel.style.color = '#3a4a5a';
      hintLabel.textContent = words.length >= 2 ? `Enter to feed (${known}/${words.length} known)` : '';
    }
  } else {
    modeLabel.textContent = 'search';
    modeLabel.style.color = '#3a4a5a';
    hintLabel.textContent = '';
    selected = -1;
    document.getElementById('panel').classList.remove('open');
  }
});

mainInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    e.preventDefault();
    feedBrain();
  }
});

const newNodeBursts = [];

let feeding = false;
async function feedBrain() {
  const input = mainInput;
  const text = input.value.trim();
  if (!text || feeding) return;
  input.value = '';
  feeding = true;

  const words = (text.toLowerCase().match(/[a-z0-9]+/g) || []).filter(w => w.length > 1);
  if (words.length < 2) { feeding = false; return; }

  const existingSet = new Set(nodes.map(n => n.id));
  const mentioned = new Set(words);
  controls.autoRotate = false;

  modeLabel.textContent = 'feeding';
  modeLabel.style.color = '#d4a843';

  // Animate word by word
  for (let wi = 0; wi < words.length; wi++) {
    const w = words[wi];
    hintLabel.textContent = `${wi + 1}/${words.length}: ${w}`;

    let targetNode;

    if (!existingSet.has(w)) {
      // New word — create node, animate birth
      // Place near previous word if exists, else random
      let x, y, z;
      if (wi > 0 && nodeMap[words[wi-1]] !== undefined) {
        const prev = nodes[nodeMap[words[wi-1]]];
        const offset = 20 + Math.random() * 15;
        const a = Math.random() * Math.PI * 2;
        const e = (Math.random() - 0.5) * Math.PI * 0.6;
        x = prev.x + offset * Math.cos(e) * Math.cos(a);
        y = prev.y + offset * Math.cos(e) * Math.sin(a);
        z = prev.z + offset * Math.sin(e);
      } else {
        const angle = Math.random() * Math.PI * 2;
        const elev = (Math.random() - 0.5) * Math.PI;
        const r = 130 + Math.random() * 40;
        x = r * Math.cos(elev) * Math.cos(angle);
        y = r * Math.cos(elev) * Math.sin(angle);
        z = r * Math.sin(elev);
      }

      const newNode = {
        id: w, freq: 1, depth: 'surface', ev: 0.1, nb: 0, nx: 0,
        topNb: [], topNx: [], pos: 0.5, x, y, z, idx: nodes.length,
        color: DC.surface, radius: 2.5, pulse: Math.random() * Math.PI * 2,
        isNew: true, birthTime: clock.getElapsedTime()
      };
      nodes.push(newNode);
      nodeMap[w] = newNode.idx;
      existingSet.add(w);
      targetNode = newNode;

      // Ring burst
      addRingBurst(x, y, z);
      rebuildNodeMesh();
    } else {
      targetNode = nodes[nodeMap[w]];
      // Flash existing node
      targetNode.isNew = true;
      targetNode.birthTime = clock.getElapsedTime();
    }

    // Camera flies to this word — slow, cinematic
    flyToNode(targetNode, 1.5);
    selected = targetNode.idx;

    // Floating label above the word
    const wl = document.getElementById('word-label');
    wl.querySelector('.wl-word').textContent = w;
    const isNewWord = !existingSet.has(w) || targetNode.freq === 1;
    wl.querySelector('.wl-info').textContent = isNewWord ? 'new neuron' : `freq: ${targetNode.freq} · ${targetNode.depth}`;
    wl.classList.add('show');

    // Add connections to previous words in window
    const newConns = [];
    for (let j = Math.max(0, wi - 3); j < wi; j++) {
      const si = nodeMap[words[j]], ti = nodeMap[w];
      if (si !== undefined && ti !== undefined) {
        links.push({ si, ti, w: 1, isNew: true, birthTime: clock.getElapsedTime() });
        newConns.push(words[j]);
      }
    }
    if (newConns.length > 0) {
      wl.querySelector('.wl-info').textContent += ` · linked to ${newConns.join(', ')}`;
    }
    if (wi > 0) rebuildNodeMesh();

    // Wait between words — slow enough to see each construction step
    await new Promise(r => setTimeout(r, 1200));
  }

  feedHighlight = { words: mentioned, time: clock.getElapsedTime() };

  // Status
  const newCount = words.filter(w => nodes[nodeMap[w]]?.freq === 1).length;
  const status = document.getElementById('feed-status');
  status.textContent = `fed ${words.length} words` + (newCount > 0 ? ` (+${newCount} new neurons)` : '');
  status.style.opacity = 1;
  setTimeout(() => { status.style.opacity = 0; }, 4000);

  document.getElementById('word-label').classList.remove('show');
  modeLabel.textContent = 'done';
  modeLabel.style.color = '#48b89a';
  hintLabel.textContent = `${nodes.length} neurons`;
  setTimeout(() => { modeLabel.textContent = 'search'; modeLabel.style.color = '#3a4a5a'; hintLabel.textContent = ''; }, 4000);

  searched = null;
  feeding = false;
}

let feedHighlight = null;

// Camera fly-to animation
let flyTarget = null; // {from, to, lookAt, startTime, duration}

function flyToNode(n, duration = 2.0) {
  const pos = new THREE.Vector3(n.x, n.y, n.z);
  const dir = pos.clone().normalize();
  const target = dir.multiplyScalar(pos.length() + 180);
  flyTarget = {
    from: camera.position.clone(),
    to: target,
    lookAt: pos,
    startTime: clock.getElapsedTime(),
    duration,
  };
  controls.autoRotate = false;
}

// Ring burst effect for new nodes
const ringBursts = []; // {center, startTime, color}
const ringGeo = new THREE.RingGeometry(0.8, 1, 32);
const ringGroup = new THREE.Group();
scene.add(ringGroup);

function addRingBurst(x, y, z, color) {
  ringBursts.push({ x, y, z, startTime: clock.getElapsedTime(), color: color || new THREE.Color(0.9, 0.75, 0.2) });
}

function rebuildNodeMesh() {
  // Remove old mesh
  scene.remove(nodeMesh);

  const newN = nodes.length;
  const newSphereGeo = new THREE.SphereGeometry(1, 12, 8);
  const newSphereMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
  nodeMesh = new THREE.InstancedMesh(newSphereGeo, newSphereMat, newN);

  for (let i = 0; i < newN; i++) {
    const n = nodes[i];
    const sz = n.radius || Math.max(1.5, Math.min(6, Math.pow(n.freq, 0.28) * 0.8));
    sizes[i] = sz;
    dummy.position.set(n.x, n.y, n.z);
    dummy.scale.set(sz, sz, sz);
    dummy.updateMatrix();
    nodeMesh.setMatrixAt(i, dummy.matrix);
    const c = DC[n.depth] || DC.surface;
    nodeMesh.setColorAt(i, c);
  }
  nodeMesh.instanceMatrix.needsUpdate = true;
  nodeMesh.instanceColor.needsUpdate = true;
  scene.add(nodeMesh);

  // Rebuild edge geometry
  scene.remove(edgeLines);
  const ep = [], ec = [];
  for (const l of links) {
    const a = nodes[l.si], b = nodes[l.ti];
    if (!a || !b) continue;
    ep.push(a.x, a.y, a.z, b.x, b.y, b.z);
    const bright = l.isNew ? 0.4 : 0.08;
    ec.push(bright * 0.7, bright, bright * 0.8, bright * 0.7, bright, bright * 0.8);
  }
  const eg = new THREE.BufferGeometry();
  eg.setAttribute('position', new THREE.Float32BufferAttribute(ep, 3));
  eg.setAttribute('color', new THREE.Float32BufferAttribute(ec, 3));
  edgeLines = new THREE.LineSegments(eg, new THREE.LineBasicMaterial({
    vertexColors: true, transparent: true, opacity: 0.25, blending: THREE.AdditiveBlending, linewidth: 1
  }));
  scene.add(edgeLines);
}

function showPanel(n) {
  const [r,g,b] = DCA[n.depth] || [58,58,58];
  let h = `<div class="panel-word">${n.id}</div>`;
  h += `<div class="panel-depth" style="background:rgba(${r},${g},${b},0.15);color:rgb(${r},${g},${b})">${n.depth} &middot; ${n.ev} evidence</div>`;
  h += `<div class="panel-metric"><span>frequency</span><span class="v">${n.freq.toLocaleString()}</span></div>`;
  h += `<div class="panel-metric"><span>neighbors</span><span class="v">${n.nb}</span></div>`;
  h += `<div class="panel-metric"><span>next-words</span><span class="v">${n.nx}</span></div>`;
  h += `<div class="panel-metric"><span>avg position</span><span class="v">${n.pos}</span></div>`;
  if (n.topNb?.length) {
    h += `<div class="panel-section">Neighbors</div><div>${n.topNb.map(w => `<span class="panel-tag" onclick="document.getElementById('search').value='${w}';document.getElementById('search').dispatchEvent(new Event('input'))">${w}</span>`).join('')}</div>`;
  }
  if (n.topNx?.length) {
    h += `<div class="panel-section">Predicts Next</div><div>${n.topNx.map(w => `<span class="panel-tag" onclick="document.getElementById('search').value='${w}';document.getElementById('search').dispatchEvent(new Event('input'))">${w}</span>`).join('')}</div>`;
  }
  document.getElementById('panel-content').innerHTML = h;
  document.getElementById('panel').classList.add('open');
}

// Animation loop
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  controls.update();

  // Camera fly-to animation
  if (flyTarget) {
    const elapsed = t - flyTarget.startTime;
    const progress = Math.min(elapsed / flyTarget.duration, 1);
    // Smooth ease-in-out
    const ease = progress < 0.5 ? 2 * progress * progress : 1 - Math.pow(-2 * progress + 2, 2) / 2;
    camera.position.lerpVectors(flyTarget.from, flyTarget.to, ease);
    controls.target.lerp(flyTarget.lookAt, ease * 0.5);
    if (progress >= 1) flyTarget = null;
  }

  // Ring bursts — expanding rings around new nodes
  while (ringGroup.children.length > 0) ringGroup.remove(ringGroup.children[0]);
  for (let i = ringBursts.length - 1; i >= 0; i--) {
    const rb = ringBursts[i];
    const age = t - rb.startTime;
    if (age > 2) { ringBursts.splice(i, 1); continue; }
    const scale = age * 15;
    const opacity = Math.max(0, 1 - age / 2);
    const mat = new THREE.MeshBasicMaterial({ color: rb.color, transparent: true, opacity: opacity * 0.4, side: THREE.DoubleSide });
    const mesh = new THREE.Mesh(ringGeo, mat);
    mesh.position.set(rb.x, rb.y, rb.z);
    mesh.scale.set(scale, scale, scale);
    mesh.lookAt(camera.position);
    ringGroup.add(mesh);
  }

  // Raycaster for hover
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObject(nodeMesh);
  const prevHovered = hovered;
  hovered = intersects.length > 0 ? intersects[0].instanceId : -1;
  renderer.domElement.style.cursor = hovered >= 0 ? 'pointer' : '';

  // Update node appearance
  const curN = nodes.length;
  for (let i = 0; i < curN; i++) {
    if (i >= nodeMesh.count) break;
    const n = nodes[i];
    const isH = i === hovered;
    const isS = i === selected;
    const isSr = searched && n.id.includes(searched);
    const isFed = feedHighlight && feedHighlight.words.has(n.id) && (t - feedHighlight.time) < 3;
    const isNew = n.isNew && (t - n.birthTime) < 4;

    // Organic breathing
    const breathe = 1 + Math.sin(t * 0.8 + i * 0.7) * 0.04;
    const pulse = n.depth === 'deep' ? 1 + Math.sin(t * 1.5 + i) * 0.1 : 1;
    // New nodes burst in with expanding scale
    const birthScale = isNew ? Math.min((t - n.birthTime) * 2, 1) * (1 + Math.sin((t - n.birthTime) * 6) * 0.3) : 1;
    const highlight = isH ? 2.5 : isS ? 2.2 : isFed ? 2.0 : isSr ? 1.8 : 1;
    const sz = (sizes[i] || 2) * breathe * pulse * highlight * birthScale;

    dummy.position.set(n.x, n.y, n.z);
    dummy.position.y += Math.sin(t * 0.3 + i * 1.1) * 0.5;
    dummy.scale.set(sz, sz, sz);
    dummy.updateMatrix();
    nodeMesh.setMatrixAt(i, dummy.matrix);

    // Color
    const c = DC[n.depth] || DC.surface;
    if (isH || isS) {
      nodeMesh.setColorAt(i, new THREE.Color(1, 1, 1));
    } else if (isFed || isNew) {
      // Gold flash for newly fed words
      const flash = Math.sin((t - (n.birthTime || feedHighlight?.time || 0)) * 4) * 0.5 + 0.5;
      nodeMesh.setColorAt(i, new THREE.Color(0.9, 0.7 + flash * 0.3, 0.2 + flash * 0.4));
    } else if (isSr) {
      nodeMesh.setColorAt(i, c.clone().multiplyScalar(1.5));
    } else {
      nodeMesh.setColorAt(i, c);
    }
  }
  nodeMesh.instanceMatrix.needsUpdate = true;
  if (nodeMesh.instanceColor) nodeMesh.instanceColor.needsUpdate = true;

  // Edge highlighting — all connections visible, highlighted ones glow
  const eColors = edgeLines.geometry.attributes.color.array;
  let ei = 0;
  for (const l of links) {
    if (ei >= eColors.length) break;
    const isHl = (hovered >= 0 && (l.si === hovered || l.ti === hovered)) ||
                 (selected >= 0 && (l.si === selected || l.ti === selected));
    const isSr = searched && (nodes[l.si]?.id.includes(searched) || nodes[l.ti]?.id.includes(searched));
    const isFed = l.isNew && (t - l.birthTime) < 3;
    if (isFed) {
      // New connections flash gold
      const flash = Math.sin((t - l.birthTime) * 5) * 0.3 + 0.7;
      eColors[ei] = 0.9*flash; eColors[ei+1] = 0.7*flash; eColors[ei+2] = 0.2;
      eColors[ei+3] = 0.9*flash; eColors[ei+4] = 0.7*flash; eColors[ei+5] = 0.2;
    } else if (isHl) {
      eColors[ei] = 0.3; eColors[ei+1] = 0.75; eColors[ei+2] = 0.6;
      eColors[ei+3] = 0.3; eColors[ei+4] = 0.75; eColors[ei+5] = 0.6;
    } else if (isSr) {
      eColors[ei] = 0.2; eColors[ei+1] = 0.45; eColors[ei+2] = 0.55;
      eColors[ei+3] = 0.2; eColors[ei+4] = 0.45; eColors[ei+5] = 0.55;
    } else {
      // Base connections — dim but visible
      eColors[ei] = 0.08; eColors[ei+1] = 0.1; eColors[ei+2] = 0.14;
      eColors[ei+3] = 0.08; eColors[ei+4] = 0.1; eColors[ei+5] = 0.14;
    }
    ei += 6;
  }
  edgeLines.geometry.attributes.color.needsUpdate = true;

  // Animate particles along edges
  const pp = particleSystem.geometry.attributes.position.array;
  for (let i = 0; i < particleMeta.length; i++) {
    const m = particleMeta[i];
    const progress = (m.offset + t * 0.15) % 1;
    const a = nodes[m.si], b = nodes[m.ti];
    pp[i*3]   = a.x + (b.x - a.x) * progress;
    pp[i*3+1] = a.y + (b.y - a.y) * progress + Math.sin(progress * Math.PI) * 3;
    pp[i*3+2] = a.z + (b.z - a.z) * progress;
  }
  particleSystem.geometry.attributes.position.needsUpdate = true;

  // Dust rotation
  dust.rotation.y = t * 0.02;
  dust.rotation.x = t * 0.01;

  // Update floating word label position
  const wl = document.getElementById('word-label');
  if (selected >= 0 && selected < nodes.length && wl.classList.contains('show')) {
    const n = nodes[selected];
    const v = new THREE.Vector3(n.x, n.y, n.z);
    v.project(camera);
    const sx = (v.x * 0.5 + 0.5) * innerWidth;
    const sy = (-v.y * 0.5 + 0.5) * innerHeight;
    wl.style.left = sx + 'px';
    wl.style.top = (sy - 50) + 'px';
    wl.style.transform = 'translate(-50%, -100%)';
  }

  composer.render();
}

animate();
</script>
